<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neurotransmitters & the Body</title>
<style>
  body {
    margin: 0;
    padding: 2rem 1rem;
    background: #f7f6f2;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-size: 1.2rem;
    font-weight: 600;
    color: #1a1a18;
    margin-bottom: 0.25rem;
    text-align: center;
  }

  p.sub {
    font-size: 0.85rem;
    color: #6b6a64;
    margin-bottom: 1.5rem;
    text-align: center;
  }

  svg {
    max-width: 680px;
    width: 100%;
  }
</style>
</head>
<body>

<h1>Neurotransmitters and the Body</h1>
<p class="sub">Based on Myers & DeWall — PSYC 101, Chapter 2</p>

<svg viewBox="0 0 680 780" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Neurotransmitters and the body regions they affect</title>
<desc>A human body outline with labels showing which neurotransmitters affect which body regions, based on course material.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6b6a64" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Human body outline -->
<!-- Head -->
<ellipse cx="310" cy="82" rx="44" ry="52" fill="none" stroke="#3d5a99" stroke-width="2"/>
<!-- Neck -->
<rect x="292" y="130" width="36" height="28" rx="4" fill="none" stroke="#3d5a99" stroke-width="2"/>
<!-- Torso -->
<rect x="248" y="156" width="124" height="160" rx="16" fill="none" stroke="#3d5a99" stroke-width="2"/>
<!-- Left upper arm -->
<rect x="204" y="160" width="46" height="110" rx="20" fill="none" stroke="#3d5a99" stroke-width="2"/>
<!-- Left lower arm -->
<rect x="208" y="274" width="40" height="90" rx="18" fill="none" stroke="#3d5a99" stroke-width="2"/>
<!-- Left hand -->
<ellipse cx="228" cy="378" rx="20" ry="14" fill="none" stroke="#3d5a99" stroke-width="2"/>
<!-- Right upper arm -->
<rect x="370" y="160" width="46" height="110" rx="20" fill="none" stroke="#3d5a99" stroke-width="2"/>
<!-- Right lower arm -->
<rect x="372" y="274" width="40" height="90" rx="18" fill="none" stroke="#3d5a99" stroke-width="2"/>
<!-- Right hand -->
<ellipse cx="392" cy="378" rx="20" ry="14" fill="none" stroke="#3d5a99" stroke-width="2"/>
<!-- Left upper leg -->
<rect x="252" y="314" width="52" height="130" rx="22" fill="none" stroke="#3d5a99" stroke-width="2"/>
<!-- Right upper leg -->
<rect x="316" y="314" width="52" height="130" rx="22" fill="none" stroke="#3d5a99" stroke-width="2"/>
<!-- Left lower leg -->
<rect x="256" y="442" width="44" height="120" rx="18" fill="none" stroke="#3d5a99" stroke-width="2"/>
<!-- Right lower leg -->
<rect x="320" y="442" width="44" height="120" rx="18" fill="none" stroke="#3d5a99" stroke-width="2"/>
<!-- Left foot -->
<ellipse cx="278" cy="572" rx="26" ry="13" fill="none" stroke="#3d5a99" stroke-width="2"/>
<!-- Right foot -->
<ellipse cx="342" cy="572" rx="26" ry="13" fill="none" stroke="#3d5a99" stroke-width="2"/>

<!-- LEFT SIDE LABELS -->

<!-- Serotonin → head -->
<line x1="264" y1="72" x2="148" y2="68" stroke="#6b6a64" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<text x="144" y="58" text-anchor="end" font-family="'Segoe UI',sans-serif" font-size="13" fill="#1a1a18" font-weight="600">Serotonin</text>
<text x="144" y="74" text-anchor="end" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6b6a64">mood, sleep, hunger</text>

<!-- Dopamine → head -->
<line x1="268" y1="92" x2="148" y2="112" stroke="#6b6a64" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<text x="144" y="104" text-anchor="end" font-family="'Segoe UI',sans-serif" font-size="13" fill="#1a1a18" font-weight="600">Dopamine</text>
<text x="144" y="120" text-anchor="end" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6b6a64">movement, attention, emotion</text>

<!-- Norepinephrine → upper torso -->
<line x1="250" y1="190" x2="148" y2="196" stroke="#6b6a64" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<text x="144" y="188" text-anchor="end" font-family="'Segoe UI',sans-serif" font-size="13" fill="#1a1a18" font-weight="600">Norepinephrine</text>
<text x="144" y="204" text-anchor="end" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6b6a64">alertness, arousal</text>

<!-- Endorphins → torso -->
<line x1="250" y1="240" x2="148" y2="255" stroke="#6b6a64" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<text x="144" y="248" text-anchor="end" font-family="'Segoe UI',sans-serif" font-size="13" fill="#1a1a18" font-weight="600">Endorphins</text>
<text x="144" y="264" text-anchor="end" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6b6a64">pain &amp; pleasure perception</text>

<!-- ACh → arm/muscle -->
<line x1="208" y1="310" x2="148" y2="330" stroke="#6b6a64" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<text x="144" y="322" text-anchor="end" font-family="'Segoe UI',sans-serif" font-size="13" fill="#1a1a18" font-weight="600">Acetylcholine</text>
<text x="144" y="338" text-anchor="end" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6b6a64">muscle action, memory</text>

<!-- RIGHT SIDE LABELS -->

<!-- GABA → head -->
<line x1="354" y1="72" x2="474" y2="60" stroke="#6b6a64" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<text x="478" y="54" font-family="'Segoe UI',sans-serif" font-size="13" fill="#1a1a18" font-weight="600">GABA</text>
<text x="478" y="70" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6b6a64">inhibits overactivity, calming</text>

<!-- Glutamate → head -->
<line x1="356" y1="108" x2="474" y2="120" stroke="#6b6a64" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<text x="478" y="114" font-family="'Segoe UI',sans-serif" font-size="13" fill="#1a1a18" font-weight="600">Glutamate</text>
<text x="478" y="130" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6b6a64">excites brain, memory</text>

<!-- Dopamine → legs (movement) -->
<line x1="368" y1="380" x2="474" y2="370" stroke="#6b6a64" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<text x="478" y="364" font-family="'Segoe UI',sans-serif" font-size="13" fill="#1a1a18" font-weight="600">Dopamine</text>
<text x="478" y="380" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6b6a64">controls movement</text>

<!-- ACh → legs/feet -->
<line x1="364" y1="510" x2="474" y2="500" stroke="#6b6a64" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<text x="478" y="494" font-family="'Segoe UI',sans-serif" font-size="13" fill="#1a1a18" font-weight="600">Acetylcholine</text>
<text x="478" y="510" font-family="'Segoe UI',sans-serif" font-size="11" fill="#6b6a64">enables leg muscle action</text>

<!-- Caption -->
<text x="310" y="630" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="13" fill="#6b6a64">Neurotransmitters and the body regions they affect</text>
<text x="310" y="648" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" fill="#9b9a94">PSYC 101 · Chapter 2 · Myers &amp; DeWall</text>

</svg>

</body>
</html>
