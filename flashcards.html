<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSYC 101 Flashcards — CWI Summer 2026</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #1e1e38;
  --border: rgba(80,80,160,0.3);
  --border2: rgba(80,80,200,0.5);
  --text: #e8e8f0;
  --text2: #9999bb;
  --text3: #6666aa;
  --green: #4db87a;
  --green-bg: #0d2a1a;
  --red: #e07060;
  --red-bg: #2a0d0d;
  --accent: #3355cc;
  --radius-md: 8px;
  --radius-lg: 12px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #1e1e38;
    --border: rgba(80,80,160,0.3);
    --border2: rgba(80,80,200,0.5);
    --text: #e8e8f0;
    --text2: #9999bb;
    --text3: #6666aa;
    --green: #4db87a;
    --green-bg: #0d2a1a;
    --red: #e07060;
    --red-bg: #2a0d0d;
    --accent: #3355cc;
  }
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem 1rem 4rem;
}

.wrap { max-width: 660px; margin: 0 auto; }

/* ── HOME SCREEN ── */
#homeScreen { display: block; }
#studyScreen { display: none; }

.home-header { margin-bottom: 2rem; }
.home-header h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
.home-header p { font-size: 14px; color: var(--text2); }

.section-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
}

.chapter-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
  margin-bottom: 2rem;
}

.chapter-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem 1.1rem;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  user-select: none;
}

.chapter-card:hover { border-color: var(--border2); background: var(--surface2); }
.chapter-card.selected { border: 2px solid var(--accent); background: var(--green-bg); }

.chapter-card .ch-num {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 4px;
}

.chapter-card .ch-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.3;
}

.chapter-card .ch-count {
  font-size: 12px;
  color: var(--text3);
}

.chapter-card.coming-soon {
  opacity: 0.45;
  cursor: default;
  pointer-events: none;
}

.multi-controls {
  display: flex;
  gap: 10px;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}

.btn-outline {
  padding: 8px 16px;
  border-radius: var(--radius-md);
  border: 0.5px solid var(--border2);
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  cursor: pointer;
  font-family: var(--font);
  transition: background 0.15s;
}
.btn-outline:hover { background: var(--surface2); color: var(--text); }

.btn-start {
  display: block;
  width: 100%;
  padding: 13px;
  border-radius: var(--radius-md);
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font);
  transition: opacity 0.15s;
  margin-bottom: 2rem;
}
.btn-start:disabled { opacity: 0.35; cursor: default; }
.btn-start:not(:disabled):hover { opacity: 0.88; }

/* ── STUDY SCREEN ── */
.study-topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1.5rem;
}

.btn-back {
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-md);
  background: transparent;
  color: var(--text2);
  width: 34px;
  height: 34px;
  cursor: pointer;
  font-size: 18px;
  font-family: var(--font);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.btn-back:hover { background: var(--surface2); }

.study-title { font-size: 16px; font-weight: 500; color: var(--text); }
.study-subtitle { font-size: 12px; color: var(--text3); margin-top: 2px; }

/* filter chips */
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.chip {
  padding: 5px 14px;
  border-radius: 999px;
  border: 0.5px solid var(--border2);
  font-size: 12px;
  cursor: pointer;
  background: transparent;
  color: var(--text2);
  font-family: var(--font);
  transition: all 0.15s;
}
.chip.active { background: var(--surface2); color: var(--text); border-color: var(--border2); font-weight: 500; }

/* stats */
.stats { display: flex; gap: 12px; margin-bottom: 1rem; }
.stat { background: var(--surface2); border-radius: var(--radius-md); padding: 10px 14px; flex: 1; text-align: center; }
.stat-num { font-size: 20px; font-weight: 500; color: var(--text); }
.stat-num.green { color: var(--green); }
.stat-num.red { color: var(--red); }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }

.progress-wrap { background: var(--surface2); border-radius: 999px; height: 6px; margin-bottom: 1.25rem; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width 0.4s ease; width: 0%; }

/* flashcard */
.card-scene {
  perspective: 1000px;
  height: 240px;
  margin-bottom: 1.25rem;
  cursor: pointer;
}
.card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
}
.card-scene.flipped .card-inner { transform: rotateY(180deg); }
.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: var(--radius-lg);
  border: 0.5px solid var(--border);
  padding: 1.75rem;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}
.card-front { background: var(--surface); }
.card-back { background: var(--surface2); transform: rotateY(180deg); }
.card-badge {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
}
.card-term { font-size: 22px; font-weight: 500; color: var(--text); line-height: 1.35; }
.card-def { font-size: 14px; color: var(--text2); line-height: 1.7; }
.card-hint { font-size: 12px; color: var(--text3); margin-top: 1.25rem; }

/* actions */
.actions { display: flex; gap: 10px; margin-bottom: 1.25rem; }
.btn {
  flex: 1;
  padding: 10px 0;
  border-radius: var(--radius-md);
  border: 0.5px solid var(--border2);
  background: transparent;
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  font-family: var(--font);
  transition: background 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn:hover { background: var(--surface2); }
.btn:active { transform: scale(0.98); }
.btn-know { border-color: var(--green); color: var(--green); }
.btn-know:hover { background: var(--green-bg); }
.btn-again { border-color: var(--red); color: var(--red); }
.btn-again:hover { background: var(--red-bg); }

/* nav */
.nav { display: flex; gap: 10px; align-items: center; justify-content: center; margin-bottom: 2rem; }
.nav-btn {
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-md);
  background: transparent;
  color: var(--text2);
  width: 36px; height: 36px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-family: var(--font);
  transition: background 0.15s;
}
.nav-btn:hover { background: var(--surface2); }
.nav-counter { font-size: 14px; color: var(--text2); min-width: 80px; text-align: center; }

/* complete */
.complete { text-align: center; padding: 2.5rem 1rem; display: none; }
.complete .emoji { font-size: 40px; margin-bottom: 12px; }
.complete h2 { font-size: 20px; font-weight: 500; margin-bottom: 8px; }
.complete p { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; }
.btn-restart {
  padding: 10px 28px;
  border-radius: var(--radius-md);
  border: 0.5px solid var(--border2);
  background: transparent;
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  font-family: var(--font);
}
.btn-restart:hover { background: var(--surface2); }

footer {
  text-align: center;
  font-size: 12px;
  color: var(--text3);
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 0.5px solid var(--border);
}
</style>
</head>
<body>
<div class="wrap">

<!-- ═══════════════════════════════════════════
     HOME SCREEN
════════════════════════════════════════════ -->
<div id="homeScreen">
  <div class="home-header">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;">
      <h1>PSYC 101 Flashcards</h1>
      <a href="index.html" style="font-size:13px; color:var(--text3); text-decoration:none; border:0.5px solid var(--border2); border-radius:var(--radius-md); padding:6px 12px; transition:background 0.15s;" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='transparent'">← Study Hub</a>
    </div>
  </div>

  <div class="section-label">Select chapters to study</div>

  <div class="chapter-grid" id="chapterGrid"></div>

  <div class="multi-controls">
    <button class="btn-outline" onclick="selectAll()">Select all available</button>
    <button class="btn-outline" onclick="clearAll()">Clear selection</button>
    <button class="btn-outline" onclick="openCreateModal()">+ Create card</button>
  </div>

  <button class="btn-start" id="startBtn" onclick="startStudy()" disabled>
    Start flashcards
  </button>

  <!-- CUSTOM CARDS LIST -->
  <div id="customCardsSection" style="display:none; margin-top:1.5rem;">
    <div class="section-label" style="margin-bottom:10px;">Your custom cards</div>
    <div id="customCardsList"></div>
  </div>
</div>

<!-- CREATE CARD MODAL -->
<div id="createModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:100; align-items:center; justify-content:center; padding:1rem;">
  <div style="background:var(--surface); border-radius:var(--radius-lg); padding:1.5rem; width:100%; max-width:480px; border:0.5px solid var(--border2);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem;">
      <div style="font-size:16px; font-weight:500;">Create a new card</div>
      <button onclick="closeCreateModal()" style="background:none; border:none; font-size:20px; cursor:pointer; color:var(--text2); line-height:1;">&times;</button>
    </div>
    <div style="margin-bottom:0.75rem;">
      <div class="section-label" style="margin-bottom:6px;">Chapter</div>
      <select id="createChapter" style="width:100%; padding:8px 10px; border-radius:var(--radius-md); border:0.5px solid var(--border2); background:var(--bg); color:var(--text); font-family:var(--font); font-size:13px;"></select>
    </div>
    <div style="margin-bottom:0.75rem;">
      <div class="section-label" style="margin-bottom:6px;">Tag / category</div>
      <input id="createTag" type="text" placeholder="e.g. Definition, Core concept…" style="width:100%; padding:8px 10px; border-radius:var(--radius-md); border:0.5px solid var(--border2); background:var(--bg); color:var(--text); font-family:var(--font); font-size:13px;">
    </div>
    <div style="margin-bottom:0.75rem;">
      <div class="section-label" style="margin-bottom:6px;">Term (front)</div>
      <input id="createTerm" type="text" placeholder="Term or question" style="width:100%; padding:8px 10px; border-radius:var(--radius-md); border:0.5px solid var(--border2); background:var(--bg); color:var(--text); font-family:var(--font); font-size:13px;">
    </div>
    <div style="margin-bottom:1.25rem;">
      <div class="section-label" style="margin-bottom:6px;">Definition (back)</div>
      <textarea id="createDef" rows="3" placeholder="Definition or answer" style="width:100%; padding:8px 10px; border-radius:var(--radius-md); border:0.5px solid var(--border2); background:var(--bg); color:var(--text); font-family:var(--font); font-size:13px; resize:vertical;"></textarea>
    </div>
    <div id="createError" style="color:var(--red); font-size:12px; margin-bottom:0.75rem; display:none;"></div>
    <div style="display:flex; gap:10px;">
      <button class="btn-outline" onclick="closeCreateModal()" style="flex:1;">Cancel</button>
      <button onclick="saveNewCard()" style="flex:2; padding:9px; border-radius:var(--radius-md); border:none; background:var(--accent); color:#fff; font-size:14px; font-weight:500; cursor:pointer; font-family:var(--font);">Add card</button>
    </div>
  </div>
</div>



<!-- ═══════════════════════════════════════════
     STUDY SCREEN
════════════════════════════════════════════ -->
<div id="studyScreen">
  <div class="study-topbar">
    <button class="btn-back" onclick="goHome()" title="Back to chapters">&#8592;</button>
    <div>
      <div class="study-title" id="studyTitle"></div>
      <div class="study-subtitle" id="studySubtitle"></div>
    </div>
  </div>

  <div class="filter-row" id="filterRow"></div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-num green" id="statKnow">0</div><div class="stat-label">Know it</div></div>
    <div class="stat"><div class="stat-num red" id="statAgain">0</div><div class="stat-label">Still learning</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progressBar"></div></div>

  <div class="card-scene" id="cardScene" onclick="flipCard()">
    <div class="card-inner">
      <div class="card-face card-front">
        <div class="card-badge" id="cardBadge"></div>
        <div class="card-term" id="cardTerm"></div>
        <div class="card-hint">tap to reveal definition</div>
      </div>
      <div class="card-face card-back">
        <div class="card-badge" id="cardChapter"></div>
        <div class="card-def" id="cardDef"></div>
        <div class="card-hint">tap to flip back</div>
      </div>
    </div>
  </div>

  <div class="actions" id="actions" style="display:none;">
    <button class="btn btn-again" onclick="markCard(false)">&#8635; Still learning</button>
    <button class="btn btn-know" onclick="markCard(true)">&#10003; Know it</button>
  </div>

  <div class="nav">
    <button class="nav-btn" onclick="prevCard()">&#8592;</button>
    <div class="nav-counter" id="navCounter">1 / 0</div>
    <button class="nav-btn" onclick="nextCard()">&#8594;</button>
  </div>

  <div class="complete" id="complete">
    <div class="emoji">&#127881;</div>
    <h2>Deck complete!</h2>
    <p id="completeDetail"></p>
    <button class="btn-restart" onclick="restartDeck()">Study again</button>
    &nbsp;
    <button class="btn-restart" id="studyAgainBtn" onclick="restartStillLearning()" style="display:none;">Study still learning</button>
    &nbsp;
    <button class="btn-restart" onclick="goHome()">Choose chapters</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   DATA — add new chapters below as the
   semester progresses. Each chapter is an
   object with: id, num, title, cards[].
   Cards have: term, def, tag.
════════════════════════════════════════════ */
const CHAPTERS = [
  {
    id: "ch1",
    num: "Chapter 1",
    title: "Psychology's Roots, Critical Thinking & Self-Improvement",
    cards: [
      { term: "Psychology", def: "The scientific study of behavior and mental processes — how we act, think, and feel.", tag: "Definition" },
      { term: "Scientific attitude", def: "The combination of curiosity, skepticism, and humility that underlies rigorous scientific inquiry.", tag: "Core concept" },
      { term: "Critical thinking", def: "Thinking that does not blindly accept arguments and conclusions; examines assumptions, evaluates evidence, and considers alternative explanations.", tag: "Core concept" },
      { term: "Hindsight bias", def: "The tendency to believe, after learning an outcome, that we would have predicted it — the 'I knew it all along' phenomenon.", tag: "Bias/Error" },
      { term: "Theory", def: "An explanation that uses ideas and principles to organize observations and predict behaviors or events.", tag: "Research method" },
      { term: "Hypothesis", def: "A testable prediction derived from a theory; specifies what results would support or contradict the theory.", tag: "Research method" },
      { term: "Operational definition", def: "A precise, measurable statement of the procedures used to define research variables (e.g., 'sleep-deprived = 2+ fewer hours than normal').", tag: "Research method" },
      { term: "Replication", def: "Repeating a study with different participants to confirm whether the original findings can be reproduced.", tag: "Research method" },
      { term: "Preregistration", def: "Publicly posting a study's hypotheses and methods before collecting data, to prevent later changing of hypotheses to fit results.", tag: "Research method" },
      { term: "Case study", def: "An in-depth analysis of one individual or group; reveals possibilities but may not generalize to all people.", tag: "Research method" },
      { term: "Naturalistic observation", def: "Watching and recording behavior in naturally occurring situations without manipulation or control.", tag: "Research method" },
      { term: "Survey", def: "A method of gathering self-reported data from a large sample via questions about behaviors or opinions.", tag: "Research method" },
      { term: "Random sample", def: "A sample in which every person in the population has an equal chance of being included, allowing results to generalize.", tag: "Research method" },
      { term: "Correlation", def: "A statistical relationship between two variables; shows how well one predicts the other but does not prove causation.", tag: "Research method" },
      { term: "Experiment", def: "A study that manipulates one or more independent variables under controlled conditions to discover cause and effect.", tag: "Research method" },
      { term: "Independent variable", def: "The factor that is manipulated by the researcher in an experiment.", tag: "Research method" },
      { term: "Dependent variable", def: "The outcome that is measured in an experiment; it depends on the independent variable.", tag: "Research method" },
      { term: "Control group", def: "Participants in an experiment who are not exposed to the treatment; they provide a baseline for comparison.", tag: "Research method" },
      { term: "Experimental group", def: "Participants in an experiment who are exposed to the treatment (the independent variable).", tag: "Research method" },
      { term: "Random assignment", def: "Assigning participants to experimental and control groups by chance, reducing the effect of confounding variables.", tag: "Research method" },
      { term: "Confounding variable", def: "A factor other than the independent variable that might produce an effect; must be controlled in experiments.", tag: "Research method" },
      { term: "Double-blind procedure", def: "An experimental design in which neither participants nor researchers know who received the treatment, reducing bias.", tag: "Research method" },
      { term: "Placebo effect", def: "A result caused by expectations alone rather than by the actual treatment.", tag: "Research method" },
      { term: "Informed consent", def: "An ethical requirement that participants know enough about a study to decide whether to participate.", tag: "Ethics" },
      { term: "Debriefing", def: "Explaining to participants the full purpose of a study after it is completed, including any deception used.", tag: "Ethics" },
      { term: "Peer reviewers", def: "Scientists who evaluate a study's theory, originality, and accuracy before it is published in a scientific journal.", tag: "Ethics" },
      { term: "Structuralism", def: "An early psychological school that used introspection to explore the elemental structure of the human mind (Wundt's approach).", tag: "History" },
      { term: "Functionalism", def: "An early school influenced by William James and Darwin that focused on how mental and behavioral processes help an organism adapt.", tag: "History" },
      { term: "Behaviorism", def: "The view that psychology should study only observable, measurable behavior — not inner mental states.", tag: "History" },
      { term: "Humanistic psychology", def: "A school that emphasized growth, potential, and the importance of love and acceptance in shaping behavior.", tag: "History" },
      { term: "Cognitive psychology", def: "The scientific study of mental processes — thinking, knowing, remembering, and communicating.", tag: "History" },
      { term: "Cognitive neuroscience", def: "An interdisciplinary field that studies the brain activity underlying mental processes.", tag: "History" },
      { term: "Wilhelm Wundt", def: "Founded the first psychological laboratory in 1879 at Leipzig, Germany; conducted psychology's first experiment measuring reaction time.", tag: "History" },
      { term: "Mary Whiton Calkins", def: "Outscored all male students on Harvard PhD exams yet was denied the degree; became the first female APA president in 1905.", tag: "History" },
      { term: "Margaret Floy Washburn", def: "First woman to officially receive a psychology PhD; helped found animal behavior research; became second female APA president in 1921.", tag: "History" },
      { term: "Biopsychosocial approach", def: "An integrated perspective that considers biological, psychological, and social-cultural factors to understand behavior.", tag: "Core concept" },
      { term: "Nature–nurture issue", def: "The longstanding debate over the relative contributions of genes (nature) and experience or environment (nurture) to behavior.", tag: "Core concept" },
      { term: "Dual processing", def: "The principle that much information is processed simultaneously on conscious (explicit) and unconscious (implicit) tracks.", tag: "Core concept" },
      { term: "Positive psychology", def: "The scientific study of human flourishing — focusing on strengths, virtues, and factors that allow individuals and communities to thrive.", tag: "Core concept" },
      { term: "Testing effect", def: "Enhanced memory and learning that results from being tested or retrieving information, rather than from simply rereading.", tag: "Study skills" },
      { term: "SQ3R", def: "A five-step study method: Survey, Question, Read, Retrieve, Review — applies memory research to improve retention.", tag: "Study skills" },
      { term: "Psychiatry", def: "A medical specialty that diagnoses and treats mental disorders; psychiatrists are medical doctors who can prescribe medication.", tag: "Definition" },
      { term: "Clinical psychology", def: "A branch of psychology that assesses and treats mental, emotional, and behavioral disorders.", tag: "Definition" },
      { term: "Community psychology", def: "A branch that studies how people interact with social environments and focuses on social problems and prevention.", tag: "Definition" },
    ]
  },
  /* ── FUTURE CHAPTERS: paste new chapter objects here ── */
  {
    id: "ch2",
    num: "Chapter 2",
    title: "The Biology of Behavior and Consciousness",
    cards: [
      { term: "Neuroplasticity", def: "The brain's ability to change, especially during childhood, by reorganizing after damage or by building new pathways based on experience.", tag: "Neuroscience" },
      { term: "Neuron", def: "A nerve cell; the basic building block of the nervous system. Contains dendrites that receive information and axons that send it.", tag: "Neuroscience" },
      { term: "Dendrites", def: "Branching fibers of a neuron that receive and integrate incoming information and conduct it toward the cell body.", tag: "Neuroscience" },
      { term: "Axon", def: "The neuron extension that sends messages away from the cell body to other neurons, muscles, or glands.", tag: "Neuroscience" },
      { term: "Action potential", def: "An electrical signal (nerve impulse) that travels down an axon when a neuron fires.", tag: "Neuroscience" },
      { term: "Glial cells (glia)", def: "Cells that support, nourish, and protect neurons; provide myelin insulation; and send messages to one another.", tag: "Neuroscience" },
      { term: "Synapse", def: "The junction between the axon tip of a sending neuron and the dendrite or cell body of a receiving neuron.", tag: "Neuroscience" },
      { term: "Synaptic gap (synaptic cleft)", def: "The tiny gap at the synapse across which neurotransmitters travel from one neuron to another.", tag: "Neuroscience" },
      { term: "Refractory period", def: "A brief resting pause after a neuron fires, during which it cannot fire again.", tag: "Neuroscience" },
      { term: "All-or-none response", def: "A neuron either fires completely or does not fire at all — there is no partial firing.", tag: "Neuroscience" },
      { term: "Neurotransmitters", def: "Neuron-produced chemicals that cross the synaptic gap to carry messages to other neurons or muscles.", tag: "Neuroscience" },
      { term: "Reuptake", def: "Reabsorption of a neurotransmitter by the sending neuron after it has crossed the synapse.", tag: "Neuroscience" },
      { term: "Acetylcholine (ACh)", def: "Neurotransmitter that enables muscle action, learning, and memory. Deteriorates with Alzheimer's disease.", tag: "Neurotransmitters" },
      { term: "Dopamine", def: "Neurotransmitter that influences movement, learning, attention, and emotion. Oversupply linked to schizophrenia; undersupply linked to Parkinson's disease.", tag: "Neurotransmitters" },
      { term: "Serotonin", def: "Neurotransmitter that affects mood, hunger, sleep, and arousal. Undersupply linked to depression.", tag: "Neurotransmitters" },
      { term: "Norepinephrine", def: "Neurotransmitter that helps control alertness and arousal. Undersupply can depress mood.", tag: "Neurotransmitters" },
      { term: "GABA", def: "A major inhibitory neurotransmitter. Undersupply linked to seizures, tremors, and insomnia.", tag: "Neurotransmitters" },
      { term: "Glutamate", def: "A major excitatory neurotransmitter involved in memory. Oversupply can cause migraines or seizures.", tag: "Neurotransmitters" },
      { term: "Endorphins", def: "Neurotransmitters that influence the perception of pain or pleasure. Opioid drugs can suppress the body's natural endorphin supply.", tag: "Neurotransmitters" },
      { term: "Central nervous system (CNS)", def: "The brain and spinal cord.", tag: "Nervous System" },
      { term: "Peripheral nervous system (PNS)", def: "The sensory and motor neurons that connect the CNS to the rest of the body.", tag: "Nervous System" },
      { term: "Sensory neurons", def: "Neurons that carry incoming messages from the body's tissues and sensory receptors to the brain and spinal cord.", tag: "Nervous System" },
      { term: "Motor neurons", def: "Neurons that carry outgoing instructions from the CNS to the body's muscles.", tag: "Nervous System" },
      { term: "Interneurons", def: "Neurons present in the brain and spinal cord that communicate internally and process information between sensory inputs and motor outputs.", tag: "Nervous System" },
      { term: "Somatic nervous system", def: "Part of the PNS that controls the body's skeletal muscles (also called the skeletal nervous system).", tag: "Nervous System" },
      { term: "Autonomic nervous system (ANS)", def: "Part of the PNS that controls the glands and muscles of internal organs, regulating functions like heartbeat and digestion.", tag: "Nervous System" },
      { term: "Sympathetic nervous system", def: "Division of the ANS that arouses the body and mobilizes energy during stress (fight-or-flight).", tag: "Nervous System" },
      { term: "Parasympathetic nervous system", def: "Division of the ANS that calms the body and conserves energy after stress.", tag: "Nervous System" },
      { term: "Endocrine system", def: "The body's 'slow' chemical communication system; a set of glands that secrete hormones into the bloodstream.", tag: "Endocrine System" },
      { term: "Hormones", def: "Chemical messengers manufactured by endocrine glands that travel through the bloodstream and affect other tissues.", tag: "Endocrine System" },
      { term: "Adrenal glands", def: "Endocrine glands that sit above the kidneys and secrete epinephrine (adrenaline) and norepinephrine to help arouse the body during stress.", tag: "Endocrine System" },
      { term: "Pituitary gland", def: "The 'master gland' of the endocrine system, controlled by the hypothalamus; releases hormones including growth hormones and oxytocin.", tag: "Endocrine System" },
      { term: "EEG (Electroencephalogram)", def: "A brain-imaging tool that uses scalp electrodes to record waves of electrical activity across the brain's surface.", tag: "Brain Tools" },
      { term: "PET scan", def: "A brain-imaging technique that detects brain activity by showing where a radioactive form of glucose goes while the brain performs a task.", tag: "Brain Tools" },
      { term: "MRI", def: "Magnetic resonance imaging; uses magnetic fields and radio waves to produce computer-generated images of brain anatomy.", tag: "Brain Tools" },
      { term: "fMRI", def: "Functional MRI; reveals brain activity by comparing successive MRI scans to show blood flow and active brain regions.", tag: "Brain Tools" },
      { term: "Brainstem", def: "The oldest part of the brain, beginning at the top of the spinal cord; responsible for automatic survival functions.", tag: "Brain Structures" },
      { term: "Medulla", def: "Part of the brainstem that controls heartbeat and breathing.", tag: "Brain Structures" },
      { term: "Thalamus", def: "The brain's sensory control center, located on top of the brainstem; routes messages to the cerebral cortex and transmits replies.", tag: "Brain Structures" },
      { term: "Reticular formation", def: "A nerve network in the brainstem that controls arousal and filters incoming stimuli.", tag: "Brain Structures" },
      { term: "Cerebellum", def: "The 'little brain' at the rear of the brainstem; processes sensory input, coordinates movement and balance, and enables nonverbal learning and memory.", tag: "Brain Structures" },
      { term: "Limbic system", def: "A set of neural structures at the border of the brainstem and cerebral hemispheres associated with emotions, drives, and memory.", tag: "Brain Structures" },
      { term: "Amygdala", def: "Two lima-bean-sized neural clusters in the limbic system that are linked to emotion, especially aggression and fear.", tag: "Brain Structures" },
      { term: "Hypothalamus", def: "A neural structure below the thalamus that controls body temperature, hunger, thirst, and sex drive; links the nervous system to the endocrine system.", tag: "Brain Structures" },
      { term: "Hippocampus", def: "A neural center in the limbic system that helps process and store explicit memories.", tag: "Brain Structures" },
      { term: "Cerebral cortex", def: "The intricate fabric of interconnected neural cells covering the cerebral hemispheres; the ultimate control and information-processing center.", tag: "Brain Structures" },
      { term: "Frontal lobes", def: "Cortex regions at the front of the brain involved in speaking, muscle movement, planning, and judgment.", tag: "Brain Structures" },
      { term: "Parietal lobes", def: "Cortex regions at the top and rear of the brain that receive sensory input for touch and body position.", tag: "Brain Structures" },
      { term: "Occipital lobes", def: "Cortex regions at the rear of the brain that contain the visual cortex and process visual information.", tag: "Brain Structures" },
      { term: "Temporal lobes", def: "Cortex regions above the ears that contain the auditory cortex and process sound.", tag: "Brain Structures" },
      { term: "Motor cortex", def: "Area at the rear of the frontal lobes that controls voluntary movements.", tag: "Brain Structures" },
      { term: "Somatosensory cortex", def: "Area at the front of the parietal lobes that registers and processes body touch and movement sensations.", tag: "Brain Structures" },
      { term: "Association areas", def: "Areas of the cerebral cortex involved in higher mental functions such as learning, thinking, remembering, and speaking.", tag: "Brain Structures" },
      { term: "Corpus callosum", def: "The large band of neural fibers connecting the brain's two hemispheres, allowing communication between them.", tag: "Brain Structures" },
      { term: "Split brain", def: "A condition resulting from surgery that separates the two brain hemispheres by cutting the corpus callosum.", tag: "Brain Structures" },
      { term: "Neurogenesis", def: "The formation of new neurons, which occurs in some brain areas even in adulthood.", tag: "Neuroscience" },
      { term: "Consciousness", def: "Subjective awareness of oneself and one's environment; enables voluntary control, communication, and focused attention.", tag: "Consciousness" },
      { term: "Circadian rhythm", def: "The body's internal biological clock; regular bodily rhythms that occur on a 24-hour cycle.", tag: "Sleep & Dreams" },
      { term: "REM sleep", def: "Rapid eye movement sleep; a recurring sleep stage during which vivid dreams commonly occur; also called paradoxical sleep.", tag: "Sleep & Dreams" },
      { term: "N3 sleep", def: "The deep sleep stage characterized by slow, large delta waves; most restorative stage of sleep.", tag: "Sleep & Dreams" },
      { term: "Insomnia", def: "A sleep disorder characterized by persistent problems falling or staying asleep.", tag: "Sleep & Dreams" },
      { term: "Narcolepsy", def: "A sleep disorder characterized by uncontrollable sleep attacks, sometimes directly into REM sleep.", tag: "Sleep & Dreams" },
      { term: "Sleep apnea", def: "A sleep disorder in which breathing repeatedly stops and starts during sleep.", tag: "Sleep & Dreams" },
      { term: "Manifest content", def: "According to Freud, the remembered story line of a dream (as opposed to latent, hidden content).", tag: "Sleep & Dreams" },
      { term: "Latent content", def: "According to Freud, the underlying meaning of a dream (as opposed to its manifest content).", tag: "Sleep & Dreams" },
      // ── Added from Ch. 2 lecture slides ──
      { term: "Cell body", def: "The part of a neuron that contains the nucleus; the cell's life-support center.", tag: "Neuroscience" },
      { term: "Nerves", def: "Electrical cables formed from bundles of axons; part of the peripheral nervous system.", tag: "Nervous System" },
      { term: "Pons", def: "A hindbrain structure that helps coordinate movement and control sleep.", tag: "Brain Structures" },
      { term: "MEG (Magnetoencephalography)", def: "A brain-imaging technique using a head coil to record magnetic fields from the brain's natural electrical activity.", tag: "Brain Tools" },
      { term: "Biological psychology", def: "The scientific study of the links between biological and psychological processes.", tag: "Core concept" },
      { term: "Cognitive neuroscience (Ch. 2 def.)", def: "The interdisciplinary study of the brain activity linked with cognition, including perception, thinking, memory, and language.", tag: "Core concept" },
      { term: "Selective attention", def: "Focusing conscious awareness on a particular stimulus, as when texting while driving pulls attention from the road.", tag: "Consciousness" },
      { term: "Inattentional blindness", def: "Failing to see visible objects when attention is directed elsewhere — e.g., viewers tracking a basketball pass missing an umbrella-toting figure walking through the scene.", tag: "Consciousness" },
      { term: "Sequential processing", def: "Processing one aspect of a problem or stimulus at a time; usually required for new or complex tasks.", tag: "Consciousness" },
      { term: "Parallel processing", def: "Processing many aspects of a problem or stimulus simultaneously; the brain's natural mode for most functions, including vision.", tag: "Consciousness" },
      { term: "N1 sleep", def: "The lightest NREM sleep stage, occurring as a person first drifts off; brief hallucinations may occur.", tag: "Sleep & Dreams" },
      { term: "N2 sleep", def: "A deeper NREM sleep stage characterized by periodic sleep spindles, with no conscious awareness of stimuli.", tag: "Sleep & Dreams" },
      { term: "NREM sleep", def: "Non-rapid eye movement sleep; encompasses the N1, N2, and N3 stages, as distinguished from REM sleep.", tag: "Sleep & Dreams" },
      { term: "Paradoxical sleep", def: "Another name for REM sleep — the body is internally aroused (rapid brain waves, heart rate) but externally calm (muscles relaxed).", tag: "Sleep & Dreams" },
      { term: "Alpha waves", def: "The relatively slow brain waves of an awake, relaxed state, detected by EEG.", tag: "Sleep & Dreams" },
      { term: "Beta waves", def: "The relatively fast brain waves associated with an alert, waking state.", tag: "Sleep & Dreams" },
      { term: "Delta waves", def: "The large, slow brain waves associated with deep N3 sleep.", tag: "Sleep & Dreams" },
      { term: "Sleepwalking and sleeptalking", def: "Sleep disorders involving walking or talking while in deep sleep, most common in N3 sleep during childhood.", tag: "Sleep & Dreams" },
      { term: "Night terrors", def: "A sleep disorder involving high arousal and an appearance of being terrified, typically occurring during N3 sleep, mostly in children.", tag: "Sleep & Dreams" },
      { term: "Phineas Gage", def: "A 19th-century railroad worker whose frontal lobe damage from an iron rod caused personality changes, offering early evidence linking the frontal lobes to judgment and self-control.", tag: "Brain Structures" },
    ]
  },
  {
    id: "ch3",
    num: "Chapter 3",
    title: "Developing Through the Life Span",
    cards: [
      { term: "Developmental psychology", def: "The branch of psychology that studies physical, cognitive, and social changes throughout the life span.", tag: "Definition" },
      { term: "Nature–nurture issue", def: "The debate over the relative contributions of genetic inheritance (nature) and experience/environment (nurture) to development.", tag: "Core concept" },
      { term: "Continuity vs. stages", def: "The debate over whether development is a gradual, continuous process or occurs in distinct, separate stages.", tag: "Core concept" },
      { term: "Stability vs. change", def: "The debate over whether personality traits and characteristics persist through life or change as we age.", tag: "Core concept" },
      { term: "Chromosomes", def: "Threadlike structures made of DNA molecules that contain the genes.", tag: "Genetics" },
      { term: "DNA", def: "Deoxyribonucleic acid; the molecule containing the genetic information that makes up the chromosomes.", tag: "Genetics" },
      { term: "Genes", def: "Biochemical units of heredity that make up the chromosomes; segments of DNA that code for proteins.", tag: "Genetics" },
      { term: "Genome", def: "The complete instructions for making an organism, consisting of all the genetic material in its chromosomes.", tag: "Genetics" },
      { term: "Epigenetics", def: "The study of the molecular ways environments can influence gene expression without changing the DNA sequence itself.", tag: "Genetics" },
      { term: "Zygote", def: "A fertilized egg that enters a 2-week period of rapid cell division and develops into an embryo.", tag: "Prenatal Development" },
      { term: "Embryo", def: "The developing human organism from about 2 weeks after fertilization through 8 weeks.", tag: "Prenatal Development" },
      { term: "Fetus", def: "The developing human organism from 9 weeks after conception to birth.", tag: "Prenatal Development" },
      { term: "Teratogen", def: "An agent (such as a chemical or virus) that can reach the embryo or fetus during prenatal development and cause harm.", tag: "Prenatal Development" },
      { term: "Fetal alcohol syndrome (FAS)", def: "Physical and cognitive deficits in children caused by their birth mother's heavy alcohol consumption during pregnancy.", tag: "Prenatal Development" },
      { term: "Identical (monozygotic) twins", def: "Twins who develop from a single fertilized egg that splits in two, creating two genetically identical siblings.", tag: "Genetics" },
      { term: "Fraternal (dizygotic) twins", def: "Twins who develop from two separate fertilized eggs; genetically no more similar than ordinary siblings.", tag: "Genetics" },
      { term: "Maturation", def: "Biological growth processes that lead to orderly changes in behavior, relatively independent of experience.", tag: "Infancy & Childhood" },
      { term: "Cognition", def: "All mental activities associated with thinking, knowing, remembering, and communicating.", tag: "Cognitive Development" },
      { term: "Schema", def: "A concept or mental framework that organizes and interprets information.", tag: "Cognitive Development" },
      { term: "Assimilation", def: "Interpreting new experiences in terms of existing schemas.", tag: "Cognitive Development" },
      { term: "Accommodation", def: "Adapting existing schemas or creating new ones to incorporate new information that doesn't fit.", tag: "Cognitive Development" },
      { term: "Sensorimotor stage", def: "Piaget's first stage (birth to ~2 years); infants experience the world through senses and actions.", tag: "Cognitive Development" },
      { term: "Object permanence", def: "The awareness that things continue to exist even when not perceived; develops during the sensorimotor stage.", tag: "Cognitive Development" },
      { term: "Preoperational stage", def: "Piaget's second stage (~2–7 years); children use language and symbols but cannot yet perform mental operations; marked by egocentrism.", tag: "Cognitive Development" },
      { term: "Egocentrism", def: "A preoperational child's difficulty in taking another person's point of view.", tag: "Cognitive Development" },
      { term: "Concrete operational stage", def: "Piaget's third stage (~7–11 years); children can think logically about concrete events and understand conservation.", tag: "Cognitive Development" },
      { term: "Conservation", def: "The understanding that properties such as mass, volume, and number remain the same despite changes in the forms of objects.", tag: "Cognitive Development" },
      { term: "Formal operational stage", def: "Piaget's fourth stage (~12 through adulthood); abstract and hypothetical reasoning becomes possible.", tag: "Cognitive Development" },
      { term: "Vygotsky's scaffolding", def: "Temporary support given to a child by a more knowledgeable person to enable higher-level thinking; withdrawn as the child gains competence.", tag: "Cognitive Development" },
      { term: "Theory of mind", def: "The ability to understand that others have mental states (beliefs, intentions) that differ from one's own; emerges around ages 3–4½.", tag: "Cognitive Development" },
      { term: "Stranger anxiety", def: "Fear of unfamiliar people that infants commonly display, beginning around 8 months of age.", tag: "Social Development" },
      { term: "Attachment", def: "An emotional bond with another person; infants show attachment by seeking closeness and showing distress when separated.", tag: "Social Development" },
      { term: "Secure attachment", def: "Attachment style in which an infant feels safe exploring when the caregiver is present and is comforted upon reunion.", tag: "Social Development" },
      { term: "Insecure attachment", def: "Attachment style in which an infant is anxious, avoidant, or clingy; associated with insensitive caregiving.", tag: "Social Development" },
      { term: "Authoritarian parenting", def: "A parenting style that is coercive and demanding; associated with lower self-esteem and social skill in children.", tag: "Social Development" },
      { term: "Permissive parenting", def: "A parenting style that is undemanding and unrestraining; associated with more aggression and immaturity in children.", tag: "Social Development" },
      { term: "Authoritative parenting", def: "A parenting style that is responsive and confrontive; associated with highest self-esteem, self-reliance, and social competence.", tag: "Social Development" },
      { term: "Neglectful parenting", def: "A parenting style characterized by lack of involvement; associated with poor academic and social outcomes.", tag: "Social Development" },
      { term: "Puberty", def: "The period of sexual maturation during which a person becomes capable of reproducing.", tag: "Adolescence" },
      { term: "Preconventional morality", def: "Kohlberg's first level of moral reasoning; focused on self-interest and avoiding punishment (before age 9).", tag: "Moral Development" },
      { term: "Conventional morality", def: "Kohlberg's second level; focused on upholding laws and rules to gain social approval (early adolescence).", tag: "Moral Development" },
      { term: "Postconventional morality", def: "Kohlberg's third level; actions reflect belief in basic rights and self-defined ethical principles (adolescence and beyond).", tag: "Moral Development" },
      { term: "Identity", def: "One's sense of self; according to Erikson, forming a clear and stable identity is the central task of adolescence.", tag: "Adolescence" },
      { term: "Social identity", def: "The 'we' aspect of one's self-concept; the part of identity that comes from group memberships.", tag: "Adolescence" },
      { term: "Erikson's stages", def: "A theory of psychosocial development with eight stages across the life span, each involving a specific crisis to resolve (e.g., trust vs. mistrust, identity vs. role confusion).", tag: "Social Development" },
      { term: "Emerging adulthood", def: "The period from about age 18 to the mid-twenties; between adolescence and full adult independence.", tag: "Adulthood" },
      { term: "Menopause", def: "The cessation of menstruation; marks the end of a woman's reproductive years, typically in middle adulthood.", tag: "Adulthood" },
      { term: "Infantile amnesia", def: "The inability to consciously recall events from before about age 3, due to incomplete brain development.", tag: "Infancy & Childhood" },
      { term: "Temperament", def: "A person's characteristic emotional reactivity and intensity; largely biologically based and present from infancy.", tag: "Infancy & Childhood" },
      { term: "Imaginary audience", def: "An adolescent's belief that others are constantly watching and judging them; a form of egocentrism.", tag: "Adolescence" },
      { term: "Personal fable", def: "An adolescent's sense of personal uniqueness and invulnerability; a form of egocentrism.", tag: "Adolescence" },
      // ── Added from Ch. 3 lecture slides ──
      { term: "Heredity", def: "The genetic transfer of characteristics from parents to offspring.", tag: "Genetics" },
      { term: "Epigenetic marks", def: "Molecules attached to DNA that trigger or block the expression of genes, without changing the DNA sequence itself.", tag: "Genetics" },
      { term: "Newborn reflexes", def: "Automatic, survival-supporting responses newborns arrive with, including rooting, sucking, startle, and grasping reflexes.", tag: "Prenatal Development" },
      { term: "Strange situation (Ainsworth)", def: "Mary Ainsworth's experimental procedure for testing infant attachment by observing responses to a caregiver's departures and returns.", tag: "Social Development" },
      { term: "Harlow's attachment experiments", def: "Harry and Margaret Harlow's studies showing infant monkeys raised with artificial mothers clung to a soft cloth mother over a wire one providing food, and were terror-stricken without a mother figure in unfamiliar situations — evidence that attachment involves more than feeding.", tag: "Social Development" },
      { term: "Adolescent brain development", def: "During adolescence, the frontal lobes (judgment, impulse control) mature more slowly than the emotional limbic system, which can contribute to impulsiveness and risk-taking.", tag: "Adolescence" },
      { term: "Moral intuition", def: "Quick, automatic gut feelings about right and wrong that underlie much of moral judgment, occurring before or without conscious moral reasoning.", tag: "Moral Development" },
      { term: "Selection effect", def: "The tendency for people to choose companions and environments that match and reinforce their own traits — e.g., teens gravitating toward peers with similar interests.", tag: "Adolescence" },
      { term: "Social clock", def: "The culturally preferred timing of major life events such as marriage, parenthood, and retirement.", tag: "Adulthood" },
      { term: "Terminal decline", def: "A marked drop in cognitive functioning observed in the last few years before death, distinct from typical age-related cognitive change.", tag: "Adulthood" },
    ]
  },
  {
    id: "ch5",
    num: "Chapter 5",
    title: "Sensation & Perception",
    cards: [
      // ── Basic Concepts ──
      { term: "Sensation", def: "The process by which sensory receptors and the nervous system receive and represent stimulus energies from the environment.", tag: "Definition" },
      { term: "Perception", def: "The process by which the brain organizes and interprets sensory information, transforming it into meaningful objects and events.", tag: "Definition" },
      { term: "Bottom-up processing", def: "Information processing that begins with the sensory receptors and works up to the brain's integration of sensory information (e.g., detecting lines, angles, and colors).", tag: "Core concept" },
      { term: "Top-down processing", def: "Information processing guided by higher-level mental processes — drawing on experience and expectations to interpret what the senses detect.", tag: "Core concept" },
      { term: "Transduction", def: "The process of converting outside energy (light, sound, etc.) into neural impulses the brain can use. Steps: receive stimulation → transform into neural impulses → deliver to the brain.", tag: "Core concept" },
      { term: "Absolute threshold", def: "The minimum stimulus energy needed to detect a particular stimulus 50% of the time. Stimuli below this level are called subliminal.", tag: "Core concept" },
      { term: "Subliminal stimulation", def: "Stimulation below an individual's absolute threshold for conscious awareness. People can be primed by subliminal stimuli, but research shows no powerful or enduring persuasive effect on behavior.", tag: "Core concept" },
      { term: "Difference threshold (jnd)", def: "The minimum difference between two stimuli required for detection 50% of the time; also called the just noticeable difference (jnd).", tag: "Core concept" },
      { term: "Weber's Law", def: "Two stimuli must differ by a constant minimum percentage (not a constant amount) to be detected. The exact percentage varies by stimulus type.", tag: "Core concept" },
      { term: "Sensory adaptation", def: "Reduced sensitivity in response to constant stimulation. Heightens alertness to novelty and helps us focus on informative changes without being distracted by background chatter.", tag: "Core concept" },
      { term: "Perceptual set", def: "A mental predisposition to perceive one thing rather than another; affects what individuals see, hear, taste, and feel.", tag: "Core concept" },
      // ── Vision ──
      { term: "Wavelength", def: "The distance from the peak of one light wave to the peak of the next. Wavelength determines hue (color) — shorter waves appear blue-violet; longer waves appear red.", tag: "Vision" },
      { term: "Intensity (light)", def: "The amount of energy in a light wave, determined by the wave's amplitude (height). Intensity influences perceived brightness.", tag: "Vision" },
      { term: "Iris", def: "A doughnut-shaped muscle ring that controls pupil size, regulating how much light enters the eye.", tag: "Vision" },
      { term: "Lens (eye)", def: "Focuses light rays into an image on the retina — the multilayered lining on the back inner surface of the eye.", tag: "Vision" },
      { term: "Retina", def: "The light-sensitive back inner surface of the eye containing receptor rods and cones, plus layers of neurons that begin processing visual information.", tag: "Vision" },
      { term: "Fovea", def: "The central area of the retina where cones are clustered; enables sharp color and detail vision; some cones have a direct connection to the brain.", tag: "Vision" },
      { term: "Optic nerve", def: "Carries neural impulses from the eye to the brain, threading through the retina and connecting at the thalamus before reaching the visual cortex.", tag: "Vision" },
      { term: "Blind spot", def: "The point where the optic nerve leaves the eye — it has no receptor cells and therefore cannot detect light.", tag: "Vision" },
      { term: "Rods vs. cones", def: "Rods: ~120 million, periphery of retina, high dim-light sensitivity, low color/detail sensitivity. Cones: ~6 million, center of retina, high color and detail sensitivity, low dim-light sensitivity.", tag: "Vision" },
      { term: "Young-Helmholtz trichromatic theory", def: "The retina contains three types of color receptors (red, green, blue) that, when stimulated in combination, produce the perception of any color.", tag: "Vision" },
      { term: "Opponent-process theory", def: "Opposing retinal processes (red–green, yellow–blue, white–black) enable color vision. Explains phenomena like negative afterimages.", tag: "Vision" },
      { term: "Two-stage color processing", def: "Stage 1: retina's red, green, and blue cones respond to color stimuli. Stage 2: cones' responses are processed by opponent-process cells in the brain. Both theories work together.", tag: "Vision" },
      // ── Hearing ──
      { term: "Frequency (sound)", def: "The number of complete wavelengths that pass a point per second; determines the pitch we hear. Measured in hertz (Hz).", tag: "Hearing" },
      { term: "Amplitude (sound)", def: "The height of a sound wave; determines the loudness we hear. Measured in decibels (dB).", tag: "Hearing" },
      { term: "Cochlea", def: "A coiled, fluid-filled tube in the inner ear. Fluid ripples bend hair cells on the basilar membrane, triggering nerve impulses that travel via the auditory nerve to the thalamus and then the auditory cortex (temporal lobe).", tag: "Hearing" },
      { term: "Place theory (pitch)", def: "Different pitches activate hair cells at different places along the cochlea's basilar membrane.", tag: "Hearing" },
      { term: "Frequency theory (pitch)", def: "The rate of nerve impulses traveling up the auditory nerve matches the frequency of a tone, allowing pitch to be perceived.", tag: "Hearing" },
      { term: "Sensorineural hearing loss", def: "The most common and irreversible form of hearing loss; caused by damage to the cochlea's receptor cells or the auditory nerves. Also called nerve deafness.", tag: "Hearing" },
      { term: "Conduction hearing loss", def: "A less common form of hearing loss caused by damage to the mechanical system that conducts sound waves to the cochlea.", tag: "Hearing" },
      { term: "Sound localization", def: "The brain computes a sound's location by detecting that sound waves reach one ear sooner and more intensely than the other.", tag: "Hearing" },
      // ── Touch & Pain ──
      { term: "Four basic skin senses", def: "Pressure, warmth, cold, and pain. Other skin sensations are variations of these four basics.", tag: "Touch & Pain" },
      { term: "Pain as a biopsychosocial event", def: "Pain is shaped by biological factors (nociceptors, genes), psychological factors (attention, memory, expectations), and social-cultural factors (culture, social situation).", tag: "Touch & Pain" },
      { term: "Nociceptors", def: "Sensory receptors that detect hurtful temperatures, pressure, or chemicals. The brain's neural networks process these signals and produce the perception of pain.", tag: "Touch & Pain" },
      { term: "Phantom limb sensation", def: "Pain or sensation perceived in a limb that no longer exists — an example of pain being generated by the brain itself, not peripheral input.", tag: "Touch & Pain" },
      { term: "Endorphins (pain)", def: "Natural painkillers released by the brain with a soothing effect; part of the body's built-in pain control system. Opioid drugs mimic and can suppress the body's natural endorphin supply.", tag: "Touch & Pain" },
      { term: "Hypnosis and pain", def: "A social interaction where one person suggests certain perceptions will occur. Inhibits pain-related brain activity; may block attention to stimuli rather than the sensory input itself.", tag: "Touch & Pain" },
      // ── Taste & Smell ──
      { term: "Five basic tastes", def: "Sweet (energy source), salty (sodium), sour (potential toxic acid), bitter (potential poisons), and umami (proteins for growth and repair).", tag: "Taste & Smell" },
      { term: "Taste buds", def: "Located in bumps on the tongue; each bump contains 200+ buds, each with 50–100 taste receptor cells that catch food chemicals and send messages to the brain.", tag: "Taste & Smell" },
      { term: "Olfaction (smell)", def: "A chemical sense in which olfactory neurons bypass the thalamus and connect more directly to brain regions linked to memory and emotion.", tag: "Taste & Smell" },
      { term: "Olfactory capacity", def: "Olfactory receptors can produce different patterns to identify an estimated 1 trillion different odors, aided by both biology and learned associations.", tag: "Taste & Smell" },
      { term: "Taste–smell connection in the brain", def: "Taste and smell are processed in adjacent brain areas (frontal/temporal lobe border), which is why smells can powerfully trigger taste memories.", tag: "Taste & Smell" },
      // ── Body Senses & Sensory Interaction ──
      { term: "Kinesthesia", def: "The system for sensing the position and movement of individual body parts; uses sensors in joints, tendons, and muscles; processed in the cerebellum.", tag: "Body Senses" },
      { term: "Vestibular sense", def: "The sense of body movement, position, and balance; uses hair-like receptors in the semicircular canals and vestibular sacs of the inner ear; processed in the cerebellum.", tag: "Body Senses" },
      { term: "Sensory interaction", def: "The principle that one sense may influence another (e.g., smell enhancing taste, vision and hearing interacting). The brain blends inputs from multiple channels.", tag: "Body Senses" },
      { term: "Embodied cognition", def: "The influence of bodily sensations, gestures, and other physical states on cognitive preferences and judgments.", tag: "Body Senses" },
      { term: "Synesthesia", def: "A condition where one type of sensation produces another (e.g., seeing colors when hearing music), occurring when brain circuits for two or more senses become joined.", tag: "Body Senses" },
      // ── Vision: Perceptual Organization ──
      { term: "Prosopagnosia (face blindness)", def: "A condition in which a person cannot recognize faces despite normal vision. Illustrates the distinction between sensation (which is intact) and perception (which is impaired).", tag: "Vision" },
      { term: "Figure-ground", def: "The perceptual tendency to organize stimuli into a figure (the object we focus on) standing out from a background (ground). A key Gestalt principle of perceptual organization.", tag: "Vision" },
      { term: "Gestalt principles", def: "A set of principles (proximity, continuity, closure, similarity) describing how the brain organizes sensory elements into meaningful wholes rather than processing them as isolated parts.", tag: "Vision" },
      { term: "Depth perception", def: "The ability to see objects in three dimensions and judge distance, even though images projected on the retina are two-dimensional.", tag: "Vision" },
      { term: "Visual cliff", def: "A laboratory device used to test depth perception in infants and young animals; consists of a glass-covered drop-off. Most crawling infants and young animals refuse to cross the deep side, showing innate depth perception.", tag: "Vision" },
      { term: "Binocular cues", def: "Depth cues that require both eyes; include retinal disparity (the slightly different images each eye receives) and convergence (the degree to which eyes turn inward when focusing on nearby objects).", tag: "Vision" },
      { term: "Retinal disparity", def: "A binocular depth cue: the greater the difference between the images on the two retinas, the closer the object.", tag: "Vision" },
      { term: "Monocular cues", def: "Depth cues available to either eye alone, such as relative size, interposition, relative clarity, texture gradient, relative height, relative motion, linear perspective, and light and shadow.", tag: "Vision" },
      { term: "Perceptual constancy", def: "The ability to perceive objects as stable and unchanging even when illumination and retinal images change. Includes color, shape, size, and brightness constancy.", tag: "Vision" },
      { term: "Color constancy", def: "Perceiving familiar objects as having consistent color even when illumination changes the wavelengths they reflect.", tag: "Vision" },
      // ── Context, Motivation & Emotion ──
      { term: "Context effects on perception", def: "Our immediate context creates expectations that influence what we perceive top-down. The same stimulus can be perceived differently depending on surrounding cues (e.g., 'eel on the wagon' vs. 'eel on the orange').", tag: "Core concept" },
      { term: "Motivation and perception", def: "Motives can bias our interpretation of neutral stimuli — e.g., a water bottle looks closer to a thirsty person, and a softball appears larger to a batter who is hitting well.", tag: "Core concept" },
      { term: "Emotion and perception", def: "Emotions can shift perception — e.g., hearing sad music makes people more likely to perceive an ambiguous word as 'mourning' rather than 'morning.'", tag: "Core concept" },
      // ── Hearing ──
      { term: "Decibel", def: "The unit used to measure sound intensity. Zero decibels = the lowest level detectable by human ears. Normal conversation ≈ 60 dB. Prolonged exposure above 85 dB can cause hearing loss.", tag: "Hearing" },
      { term: "Cochlear implant", def: "A bionic ear device that translates sounds into electrical signals and wires them into the cochlea's nerves, transmitting sound information to the brain. Most effective when implanted early in life.", tag: "Hearing" },
      { term: "Hair cells (auditory)", def: "Tiny receptor cells lining the basilar membrane of the cochlea — about 16,000 total. Deflecting their cilia by even the width of an atom triggers a neural response. Damage is the main cause of sensorineural hearing loss.", tag: "Hearing" },
      // ── Touch & Pain ──
      { term: "Gate-control theory", def: "The spinal cord contains a 'gate' that can block or allow pain signals to reach the brain. Small nerve fibers open the gate (pain); large-fiber activity (via massage, acupuncture, or electrical stimulation) can close it.", tag: "Touch & Pain" },
      { term: "Pain memory and the peak-end rule", def: "People's memory of pain is shaped more by its peak intensity and how it felt at the end than by its duration. A longer procedure with a milder ending may be remembered as less painful than a shorter, sharply ending one.", tag: "Touch & Pain" },
      { term: "Distraction and pain control", def: "Drawing attention away from painful stimulation activates brain pathways that decrease pain and increase tolerance. Virtual reality is especially effective for burn patients by fully immersing attention elsewhere.", tag: "Touch & Pain" },
      { term: "Placebo and pain", def: "Placebos reduce pain by dampening the CNS's attention to painful experiences; belief in the fake painkiller can trigger the brain to release endorphins. Combining a placebo with distraction (amplified by hypnosis) maximizes relief.", tag: "Touch & Pain" },
      // ── Smell ──
      { term: "Pheromones", def: "Chemical signals secreted by one member of a species that can affect the behavior or physiology of other members. May influence sexual attraction and other social behaviors.", tag: "Taste & Smell" },
      { term: "Olfactory bulb", def: "The brain structure that first receives smell information from olfactory receptor cells; it connects directly to the limbic system (memory and emotion) without routing through the thalamus first.", tag: "Taste & Smell" },
      // ── Body Senses ──
      { term: "Proprioceptors", def: "Millions of position and motion sensors in muscles, tendons, and joints throughout the body that provide constant feedback to the brain, enabling kinesthesia.", tag: "Body Senses" },
      { term: "Semicircular canals", def: "Three fluid-filled loops in the inner ear (arranged in three planes) that detect head rotation; when the head moves, fluid shifts and bends hair-like receptors, sending balance information to the cerebellum.", tag: "Body Senses" },
      { term: "Vestibular sacs", def: "Calcium-crystal–filled structures in the inner ear that, together with the semicircular canals, detect head tilt and contribute to the sense of balance; send signals to the cerebellum.", tag: "Body Senses" },
      // ── ESP ──
      { term: "Extrasensory perception (ESP)", def: "The controversial claim that perception can occur apart from sensory input. Includes telepathy (mind-to-mind), clairvoyance (perceiving remote events), and precognition (perceiving future events).", tag: "ESP" },
      { term: "Scientific view of ESP", def: "Most research psychologists are skeptical. ESP claims are difficult to test in controlled, reproducible environments, and methods of supportive studies have been widely criticized as flawed.", tag: "ESP" },
      // ── Added from Ch. 5 lecture slides ──
      { term: "Sensory receptors", def: "Sensory nerve endings that respond to stimuli, initiating the sensation process.", tag: "Core concept" },
      { term: "Hue", def: "The dimension of color determined by a light wave's wavelength — what we name as 'blue,' 'red,' etc.", tag: "Vision" },
      { term: "Feature detectors", def: "Nerve cells in the visual cortex that respond to specific features of a stimulus, such as shape, angle, or movement, passing information to other cortical areas for pattern interpretation.", tag: "Vision" },
      { term: "Shape constancy", def: "Perceiving the form of a familiar object as constant even when the retinal image of it changes.", tag: "Vision" },
      { term: "Size constancy", def: "Perceiving an object as having a constant size even when the viewer's distance from it varies.", tag: "Vision" },
      { term: "Convergence", def: "A binocular depth cue: the inward angle of the eyes increases as they focus on a nearer object.", tag: "Vision" },
      { term: "Perceptual adaptation", def: "The ability to adjust to an artificially displaced or even inverted visual field, including with distorted or reversed vision.", tag: "Vision" },
      { term: "Audition", def: "The sense or act of hearing.", tag: "Hearing" },
      { term: "Psychokinesis", def: "The controversial, unsupported claim of 'mind over matter' — that a person's mind can move or influence physical objects directly.", tag: "ESP" },
    ]
  },
  {
    id: "ch6",
    num: "Chapter 6",
    title: "Learning",
    cards: [
      // ── How We Learn ──
      { term: "Learning", def: "The process of acquiring, through experience, new and relatively enduring information or behaviors.", tag: "Definition" },
      { term: "Associative learning", def: "Learning that certain events occur together; two stimuli (classical conditioning) or a behavior and its consequence (operant conditioning) become linked.", tag: "Definition" },
      { term: "Conditioning", def: "The process of learning associations. Takes two main forms: classical (linking two stimuli) and operant (linking behavior and consequence).", tag: "Definition" },
      { term: "Cognitive learning", def: "The acquisition of mental information — through observation, language, or insight — that guides behavior without requiring direct experience.", tag: "Definition" },
      // ── Classical Conditioning ──
      { term: "Classical conditioning", def: "A type of learning in which one learns to link two stimuli and thus to anticipate events; involves respondent (automatic) behavior. Pioneered by Ivan Pavlov.", tag: "Classical Conditioning" },
      { term: "Unconditioned stimulus (US)", def: "A stimulus that naturally and automatically triggers an unconditioned response (e.g., food triggering salivation).", tag: "Classical Conditioning" },
      { term: "Unconditioned response (UR)", def: "The unlearned, naturally occurring response to the unconditioned stimulus (e.g., salivating to food in the mouth).", tag: "Classical Conditioning" },
      { term: "Neutral stimulus (NS)", def: "A stimulus that initially produces no conditioned response — before it is paired with the unconditioned stimulus.", tag: "Classical Conditioning" },
      { term: "Conditioned stimulus (CS)", def: "An originally neutral stimulus that, after association with an unconditioned stimulus, comes to trigger a conditioned response.", tag: "Classical Conditioning" },
      { term: "Conditioned response (CR)", def: "The learned response to a previously neutral (now conditioned) stimulus. Conditioned = learned; unconditioned = unlearned.", tag: "Classical Conditioning" },
      { term: "Acquisition (classical)", def: "The first stage of classical conditioning — the period during which the NS is repeatedly paired with the US until the NS becomes a CS that reliably triggers the CR.", tag: "Classical Conditioning" },
      { term: "Extinction (classical)", def: "The drop-off in the conditioned response when the CS is repeatedly presented without the US.", tag: "Classical Conditioning" },
      { term: "Spontaneous recovery", def: "The reappearance of a weakened conditioned response after a rest period, suggesting the CR was suppressed rather than eliminated by extinction.", tag: "Classical Conditioning" },
      { term: "Generalization (classical)", def: "The tendency to respond to stimuli similar to the CS — e.g., a dog conditioned to one tone also responds somewhat to a different tone.", tag: "Classical Conditioning" },
      { term: "Discrimination (classical)", def: "The learned ability to distinguish between the CS (which predicts the US) and other irrelevant stimuli that do not.", tag: "Classical Conditioning" },
      { term: "Taste aversion", def: "A classically conditioned avoidance of a food whose consumption was followed by illness, even hours later. Illustrates that biology limits conditioning — rats avoid tastes, not sights/sounds, associated with sickness.", tag: "Classical Conditioning" },
      // ── Operant Conditioning ──
      { term: "Operant conditioning", def: "A type of learning in which behavior is strengthened if followed by a reinforcer or diminished if followed by a punisher. Behavior operates on the environment to produce consequences.", tag: "Operant Conditioning" },
      { term: "Law of effect (Thorndike)", def: "Thorndike's principle that rewarded behaviors tend to be repeated; the foundation on which Skinner built operant conditioning.", tag: "Operant Conditioning" },
      { term: "Operant chamber (Skinner box)", def: "A chamber with a bar or button that an animal presses to receive a reward; used by Skinner to study operant conditioning. Includes a device that records responses.", tag: "Operant Conditioning" },
      { term: "Reinforcement", def: "Any event that strengthens (increases the frequency of) the behavior it follows. Can be positive (adding something desirable) or negative (removing something aversive).", tag: "Operant Conditioning" },
      { term: "Shaping", def: "An operant conditioning procedure in which successive approximations of a desired behavior are rewarded, gradually guiding the subject toward the target behavior.", tag: "Operant Conditioning" },
      { term: "Positive reinforcement", def: "Strengthens a response by presenting a typically pleasurable stimulus immediately after the behavior (e.g., giving a dog a treat for sitting).", tag: "Operant Conditioning" },
      { term: "Negative reinforcement", def: "Strengthens a response by reducing or removing an unpleasant stimulus (e.g., taking aspirin relieves a headache, reinforcing the pill-taking behavior). NOT the same as punishment.", tag: "Operant Conditioning" },
      { term: "Primary reinforcer", def: "An innately satisfying reinforcer — one that does not require learning to be effective (e.g., food when hungry, pain relief).", tag: "Operant Conditioning" },
      { term: "Conditioned (secondary) reinforcer", def: "A stimulus that gains reinforcing power through learned association with a primary reinforcer (e.g., money, grades, praise, social-media likes).", tag: "Operant Conditioning" },
      { term: "Continuous reinforcement", def: "Reinforcing the desired response every time it occurs. Produces rapid learning but also rapid extinction when reinforcement stops.", tag: "Operant Conditioning" },
      { term: "Partial (intermittent) reinforcement", def: "Reinforcing a response only some of the time. Produces slower initial learning but much greater resistance to extinction than continuous reinforcement.", tag: "Operant Conditioning" },
      { term: "Fixed-ratio schedule", def: "Reinforces behavior after a set number of responses (e.g., a free coffee after every 10 purchased). Produces high, steady response rates with brief pauses after reinforcement.", tag: "Operant Conditioning" },
      { term: "Variable-ratio schedule", def: "Reinforces behavior after an unpredictable number of responses (e.g., slot machines, fishing). Produces very high, persistent response rates and is most resistant to extinction.", tag: "Operant Conditioning" },
      { term: "Fixed-interval schedule", def: "Reinforces the first response after a fixed time period. Produces a choppy stop-start pattern — responding picks up as the reinforcement time approaches.", tag: "Operant Conditioning" },
      { term: "Variable-interval schedule", def: "Reinforces the first response after unpredictable time intervals (e.g., checking for a text that might arrive anytime). Produces slow, steady responding.", tag: "Operant Conditioning" },
      { term: "Punishment", def: "An event that decreases the frequency of the behavior it follows. Positive punishment adds an unpleasant stimulus; negative punishment removes a rewarding stimulus.", tag: "Operant Conditioning" },
      { term: "Positive punishment", def: "Decreases a behavior by administering an unpleasant stimulus after it (e.g., a speeding ticket, a reprimand).", tag: "Operant Conditioning" },
      { term: "Negative punishment", def: "Decreases a behavior by removing a rewarding stimulus after it (e.g., taking away screen time, revoking driving privileges).", tag: "Operant Conditioning" },
      // ── Biology, Cognition & Observational Learning ──
      { term: "Biological constraints on conditioning", def: "Each species is biologically predisposed (prepared by evolution) to more easily learn associations that aid its survival, and resists associations that are not naturally adaptive.", tag: "Biology & Cognition" },
      { term: "Cognitive map", def: "A mental representation of one's environment; rats exploring a maze develop a cognitive map even without rewards, demonstrating that learning can occur without reinforcement.", tag: "Biology & Cognition" },
      { term: "Latent learning", def: "Learning that occurs but is not demonstrated until there is some incentive to do so — evidence that cognition (not just reward) plays a role in learning.", tag: "Biology & Cognition" },
      { term: "Observational learning (social learning)", def: "Learning by watching and imitating others; also called modeling. We learn by observing others' behavior and its consequences — vicariously.", tag: "Observational Learning" },
      { term: "Modeling", def: "The process of observing and imitating a specific behavior. We learn our native languages, social behaviors, and much else by modeling others.", tag: "Observational Learning" },
      { term: "Mirror neurons", def: "Frontal-lobe neurons proposed to fire both when performing an action and when observing another perform the same action; may provide a neural basis for imitation and observational learning.", tag: "Observational Learning" },
      { term: "Prosocial modeling", def: "Observing helpful, positive behavior in others increases similar behavior in observers. Research shows watching prosocial TV/films boosts later helping behavior.", tag: "Observational Learning" },
      { term: "Antisocial modeling", def: "Observing aggressive or harmful behavior can increase similar behavior in observers — e.g., children of abusive parents are at higher risk for aggression.", tag: "Observational Learning" },
      { term: "Vicarious reinforcement / punishment", def: "Learning to anticipate a behavior's consequences by observing others being reinforced or punished for the same behavior.", tag: "Observational Learning" },
      { term: "Bobo doll experiment (Bandura)", def: "Classic study by Albert Bandura in which children who watched an adult aggressively attack a Bobo doll later imitated those specific aggressive acts — demonstrating observational learning of aggression.", tag: "Observational Learning" },
      // ── Key Figures & Comparisons ──
      { term: "Ivan Pavlov", def: "Russian physiologist who discovered classical conditioning while studying dogs' digestion; pioneered the objective study of associative learning and its basic processes (acquisition, extinction, generalization, discrimination).", tag: "Key Figures" },
      { term: "B. F. Skinner", def: "Behaviorist who developed operant conditioning and the Skinner box; argued that external consequences — not inner thoughts — shape behavior; emphasized reinforcement over punishment.", tag: "Key Figures" },
      { term: "Albert Bandura", def: "Pioneering researcher of observational learning; conducted the Bobo doll experiment showing children imitate aggressive models; identified vicarious reinforcement and punishment.", tag: "Key Figures" },
      { term: "John B. Watson", def: "Behaviorist who studied classical conditioning in humans (the 'Little Albert' experiment); believed psychology should study only observable behavior, not inner mental states.", tag: "Key Figures" },
      { term: "Classical vs. operant conditioning", def: "Classical: associations between events we don't control; responses are automatic/involuntary. Operant: associations between our behavior and its consequences; responses are voluntary. Both show acquisition, extinction, spontaneous recovery, generalization, and discrimination.", tag: "Key Figures" },
      // ── Added from Ch. 6 lecture slides ──
      { term: "Respondent behavior", def: "Behavior that occurs as an automatic response to a stimulus; the type of behavior produced by classical conditioning.", tag: "Classical Conditioning" },
      { term: "Operant behavior", def: "Behavior that operates on the environment to produce consequences; the type of behavior produced by operant conditioning.", tag: "Operant Conditioning" },
