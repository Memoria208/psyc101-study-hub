      { term: "Immediate vs. delayed reinforcers", def: "Immediate reinforcers reward a behavior right away; delayed reinforcers reward it after a wait. Immediate reinforcement and reward of specific, achievable behaviors tends to be more effective at shaping behavior.", tag: "Operant Conditioning" },
      { term: "Time-out", def: "A negative punishment technique that removes a misbehaving child from access to desired stimuli, such as attention from siblings or parents.", tag: "Operant Conditioning" },
      { term: "Intrinsic vs. extrinsic motivation", def: "Intrinsic motivation comes from the desire to perform a behavior for its own sake; extrinsic motivation comes from a desire to gain a reward or avoid punishment. Excessive extrinsic rewards can undermine intrinsic motivation.", tag: "Biology & Cognition" },
    ]
  },
  {
    id: "ch7",
    num: "Chapter 7",
    title: "Memory",
    cards: [
      // ── Studying Memory ──
      { term: "Memory", def: "Learning that persists over time; the ability to encode, store, and retrieve information.", tag: "Definition" },
      { term: "Encoding", def: "The process of getting sensory information into the memory system, e.g., by extracting meaning.", tag: "Information Processing" },
      { term: "Storage", def: "The process of retaining encoded information over time.", tag: "Information Processing" },
      { term: "Retrieval", def: "The process of getting information out of memory storage and back into conscious awareness.", tag: "Information Processing" },
      { term: "Atkinson-Shiffrin three-stage model", def: "The classic model proposing that memories move through three stages: sensory memory, short-term memory, and long-term memory.", tag: "Information Processing" },
      { term: "Working memory", def: "An updated concept of short-term memory that focuses on conscious, active processing of incoming and previously stored information — a mental 'scratchpad.'", tag: "Information Processing" },
      // ── Encoding ──
      { term: "Implicit (nondeclarative) memory", def: "Retention of learned skills or classically conditioned associations, independent of conscious recollection; formed through automatic processing.", tag: "Encoding" },
      { term: "Explicit (declarative) memory", def: "Memory of facts and experiences that one can consciously know and 'declare'; encoded through conscious, effortful processing.", tag: "Encoding" },
      { term: "Automatic processing", def: "Unconscious encoding of incidental information, such as space, time, and frequency, and of well-learned information such as word meanings.", tag: "Encoding" },
      { term: "Effortful processing", def: "Encoding that requires attention and conscious effort; can become automatic through practice (e.g., learning to read).", tag: "Encoding" },
      { term: "Sensory memory", def: "The immediate, very brief recording of sensory information before it enters working memory.", tag: "Encoding" },
      { term: "Iconic memory", def: "A momentary (a few tenths of a second) sensory memory of visual stimuli; a picture-image memory.", tag: "Encoding" },
      { term: "Echoic memory", def: "A momentary (3–4 second) sensory memory of auditory stimuli; sound that echoes in the mind.", tag: "Encoding" },
      { term: "Short-term memory capacity", def: "George Miller's finding that short-term memory holds about seven items (give or take two), and that unrehearsed items fade within seconds.", tag: "Encoding" },
      { term: "Chunking", def: "Organizing information into familiar, manageable units, which often occurs automatically and aids recall.", tag: "Encoding" },
      { term: "Mnemonics", def: "Memory aids, often using vivid, meaningful imagery or well-organized systems, that help encode information.", tag: "Encoding" },
      { term: "Spacing effect", def: "The tendency for distributed (spaced-out) study or practice to yield better long-term recall than massed practice (cramming).", tag: "Encoding" },
      { term: "Testing effect", def: "Enhanced memory that results from actively retrieving (self-testing) information, rather than simply rereading it.", tag: "Encoding" },
      // ── Storage ──
      { term: "Semantic memory", def: "Explicit memory of facts and general knowledge; one of the two types of explicit memory (with episodic memory).", tag: "Storage" },
      { term: "Episodic memory", def: "Explicit memory of personally experienced events; one of the two types of explicit memory (with semantic memory).", tag: "Storage" },
      { term: "Hippocampus", def: "A limbic system structure that acts as a 'save' button for explicit memories, registering and briefly storing elements of an event before they migrate to the cortex.", tag: "Storage" },
      { term: "Memory consolidation", def: "The neural storage process by which memories, especially during sleep, migrate from the hippocampus to the cortex for more permanent storage.", tag: "Storage" },
      { term: "Cerebellum (memory)", def: "A brain structure that plays a key role in forming and storing implicit memories created through classical conditioning.", tag: "Storage" },
      { term: "Basal ganglia (memory)", def: "Deep brain structures involved in motor movement that help form implicit memories for physical skills, such as riding a bike.", tag: "Storage" },
      { term: "Infantile amnesia", def: "The inability to consciously remember memories from before about age 3–4, due to an undeveloped hippocampus and lack of language.", tag: "Storage" },
      { term: "Amygdala (memory)", def: "Emotion-processing limbic structures that boost activity in memory-forming brain areas when stress hormones signal an important, arousing event.", tag: "Storage" },
      { term: "Flashbulb memory", def: "A clear, vivid, emotionally significant 'mental snapshot' memory of an exciting or shocking event.", tag: "Storage" },
      { term: "Long-term potentiation (LTP)", def: "An increase in a synapse's firing efficiency after brief, rapid stimulation; believed to be the neural basis for learning and memory.", tag: "Storage" },
      // ── Retrieval ──
      { term: "Recall", def: "A measure of memory in which a person must retrieve information learned earlier without cues, as on a fill-in-the-blank test.", tag: "Retrieval" },
      { term: "Recognition", def: "A measure of memory in which a person identifies previously learned items, as on a multiple-choice test.", tag: "Retrieval" },
      { term: "Relearning", def: "A measure of memory in which time is saved when learning material a second time, compared with learning it originally.", tag: "Retrieval" },
      { term: "Retrieval cues", def: "Anchor points in a web of associations that provide a path to access a stored memory; the more cues encoded, the easier retrieval becomes.", tag: "Retrieval" },
      { term: "Priming", def: "The unconscious activation of certain associations, predisposing one's perception, memory, or response to a related stimulus.", tag: "Retrieval" },
      { term: "Context-dependent memory", def: "Improved retrieval of memories when in the same physical context/environment in which they were originally encoded.", tag: "Retrieval" },
      { term: "Encoding specificity principle", def: "The principle that specific cues present at encoding will be most effective at triggering retrieval of that memory.", tag: "Retrieval" },
      { term: "State-dependent memory", def: "Improved retrieval of memories when in the same physiological or emotional state (e.g., intoxicated vs. sober) as when they were encoded.", tag: "Retrieval" },
      { term: "Mood-congruent memory", def: "The tendency to recall experiences and details that are consistent with one's current mood.", tag: "Retrieval" },
      { term: "Serial position effect", def: "The tendency to recall best the first items (primacy effect) and the last items (recency effect) in a list, with poorer recall for the middle items.", tag: "Retrieval" },
      // ── Forgetting ──
      { term: "Encoding failure", def: "Forgetting that occurs because information was never encoded into memory in the first place, often due to lack of attention.", tag: "Forgetting" },
      { term: "Storage decay", def: "The gradual fading of a physical memory trace over time, illustrated by Ebbinghaus's forgetting curve — rapid at first, then leveling off.", tag: "Forgetting" },
      { term: "Retrieval failure", def: "Forgetting that occurs because stored information cannot be accessed, often due to insufficient retrieval cues (e.g., tip-of-the-tongue experiences).", tag: "Forgetting" },
      { term: "Proactive interference", def: "The disruptive, forward-acting effect of prior learning on the recall of new information.", tag: "Forgetting" },
      { term: "Retroactive interference", def: "The disruptive, backward-acting effect of new learning on the recall of old information.", tag: "Forgetting" },
      { term: "Positive transfer", def: "The facilitating (rather than interfering) effect of previously learned material on the learning of new material.", tag: "Forgetting" },
      { term: "Repression", def: "In Freud's theory, a defense mechanism that banishes painful or unacceptable memories from conscious awareness; memory researchers now believe true repression rarely, if ever, occurs.", tag: "Forgetting" },
      { term: "Anterograde amnesia", def: "An inability to form new conscious (explicit) memories after a brain injury, while memories from before the injury remain intact.", tag: "Forgetting" },
      { term: "Retrograde amnesia", def: "An inability to retrieve information from one's past, from before a brain injury or trauma.", tag: "Forgetting" },
      // ── Memory Construction Errors ──
      { term: "Memory construction / reconsolidation", def: "The process by which retrieved memories can be altered before being restored ('reconsolidated') in memory storage, meaning every 'replay' can subtly change a memory.", tag: "Memory Construction" },
      { term: "Misinformation effect", def: "Incorporating misleading information into one's memory of an event after witnessing it and receiving suggestive information about it.", tag: "Memory Construction" },
      { term: "Imagination inflation", def: "The increased confidence in a false memory that occurs after repeatedly imagining an event that never actually happened.", tag: "Memory Construction" },
      { term: "Source amnesia", def: "Attributing an event to the wrong source; retaining a memory of an event while forgetting where, when, or from whom it was learned. A major contributor to false memories.", tag: "Memory Construction" },
      { term: "Déjà vu", def: "The eerie sense of having already experienced a current situation; likely caused by source amnesia — a feeling of familiarity without a specific memory of when or where.", tag: "Memory Construction" },
    ]
  },
  {
    id: "ch8",
    num: "Chapter 8",
    title: "Thinking, Language, and Intelligence",
    cards: [
      // ── Thinking: Concepts & Problem Solving ──
      { term: "Cognition", def: "The mental activities associated with thinking, knowing, remembering, and communicating.", tag: "Definition" },
      { term: "Metacognition", def: "Thinking about our own thinking; monitoring and evaluating our own learning. Students who use metacognition perform better academically.", tag: "Core concept" },
      { term: "Concept", def: "A mental grouping of similar objects, events, ideas, or people. Concepts simplify thinking by letting us represent many items with one idea.", tag: "Thinking" },
      { term: "Prototype", def: "A mental image or best example of a category. We more quickly recognize items that closely match a prototype (e.g., a crow fits 'bird' better than a penguin).", tag: "Thinking" },
      { term: "Algorithm", def: "A methodical, step-by-step procedure that guarantees a solution. Effective but can require a lot of time and effort.", tag: "Problem Solving" },
      { term: "Heuristic", def: "A simple thinking strategy (mental shortcut) that enables quick, efficient judgments. Faster than algorithms but can lead to errors.", tag: "Problem Solving" },
      { term: "Insight", def: "A sudden Aha! moment — an abrupt, often satisfying solution. Associated with a burst of right temporal lobe activity at the moment of discovery.", tag: "Problem Solving" },
      { term: "Confirmation bias", def: "The tendency to search for information that confirms our existing beliefs and to ignore contradictory evidence.", tag: "Bias/Error" },
      { term: "Fixation", def: "An inability to view a problem from a new angle; being stuck on one approach. A major obstacle to creative problem solving.", tag: "Bias/Error" },
      // ── Decisions & Judgments ──
      { term: "Intuition", def: "Fast, automatic, unreasoned feelings and thoughts. Based on experience; huge and often adaptive, but can lead to 'overfeel and underthink' errors.", tag: "Decision Making" },
      { term: "Representativeness heuristic", def: "Judging the likelihood of something by how well it matches a prototype, while ignoring base-rate information (e.g., actual group sizes).", tag: "Decision Making" },
      { term: "Availability heuristic", def: "Estimating the likelihood of events based on how easily examples come to mind. Vivid or recent events feel more common than they are.", tag: "Decision Making" },
      { term: "Overconfidence", def: "Overestimating the accuracy of our beliefs and judgments. Also produces the planning fallacy — overestimating how quickly tasks will be completed.", tag: "Bias/Error" },
      { term: "Belief perseverance", def: "Clinging to existing beliefs even after they've been disproved. A remedy is to actively consider the opposite view.", tag: "Bias/Error" },
      { term: "Framing", def: "The way an issue is presented (worded) can powerfully shape decisions. People prefer options framed as gains rather than equivalent losses.", tag: "Decision Making" },
      // ── Creativity ──
      { term: "Creativity", def: "The ability to produce ideas that are both novel and valuable. Requires more than aptitude — also needs imaginative thinking, intrinsic motivation, and a supportive environment.", tag: "Creativity" },
      { term: "Convergent thinking", def: "Finding a single correct answer to a problem; what standard aptitude tests (like the SAT) primarily assess.", tag: "Creativity" },
      { term: "Divergent thinking", def: "The ability to consider many different options and think in novel ways; what creativity tests assess (e.g., listing many uses for a brick).", tag: "Creativity" },
      { term: "Five ingredients of creativity (Sternberg)", def: "Expertise, imaginative thinking skills, a venturesome personality, intrinsic motivation, and a creative environment.", tag: "Creativity" },
      // ── Language ──
      { term: "Language", def: "Spoken, written, or signed words and the rules for combining them to communicate meaning. Enables mind-to-mind knowledge transfer across generations.", tag: "Language" },
      { term: "Universal grammar", def: "Chomsky's concept: humans are born with a built-in readiness to learn grammar rules, explaining why children everywhere acquire language so naturally.", tag: "Language" },
      { term: "Receptive language", def: "The ability to understand language — what is said to and about us. Develops before productive language.", tag: "Language" },
      { term: "Productive language", def: "The ability to produce words. Progresses: babbling (~4 mo.) → one-word stage (~12 mo.) → two-word telegraphic speech (~24 mo.).", tag: "Language" },
      { term: "Babbling stage", def: "Beginning around 4 months, infants spontaneously utter a wide variety of sounds from all human languages, not yet imitating adult speech.", tag: "Language" },
      { term: "One-word stage", def: "Around age 1, children begin using single words to communicate whole meanings (e.g., 'Doggy!' = 'Look at the dog!'). Most first words are nouns.", tag: "Language" },
      { term: "Two-word stage / telegraphic speech", def: "Around age 2, children start pairing words in a rule-governed, noun-and-verb-heavy way (e.g., 'Want juice'). Structured but compressed, like a telegram.", tag: "Language" },
      { term: "Critical period (language)", def: "A developmental window during childhood when language is most easily mastered. Children not exposed to language by age 7 or beyond lose the ability to fully acquire any language.", tag: "Language" },
      { term: "Broca's area", def: "A region in the left frontal lobe. Damage causes difficulty producing speech while leaving comprehension relatively intact.", tag: "Brain & Language" },
      { term: "Wernicke's area", def: "A region in the left temporal lobe. Damage causes fluent but meaningless speech and an inability to understand others' sentences.", tag: "Brain & Language" },
      // ── Intelligence: Theories ──
      { term: "Intelligence", def: "The ability to learn from experience, solve problems, and use knowledge to adapt to new situations. Its definition varies with cultural context.", tag: "Intelligence" },
      { term: "General intelligence (g)", def: "Spearman's concept: a single underlying ability that predicts performance across varied mental aptitude tests, identified through factor analysis.", tag: "Intelligence" },
      { term: "Factor analysis", def: "A statistical procedure that identifies clusters of related variables. Spearman used it to identify the g factor underlying varied mental abilities.", tag: "Intelligence" },
      { term: "Fluid intelligence (Gf)", def: "The ability to reason speedily and abstractly with novel problems. Generally declines with age.", tag: "Intelligence" },
      { term: "Crystallized intelligence (Gc)", def: "Accumulated knowledge as reflected in vocabulary and applied skills. Continues to grow into old age.", tag: "Intelligence" },
      { term: "CHC theory (Cattell-Horn-Carroll)", def: "Affirms a general intelligence factor (g) plus fluid (Gf) and crystallized (Gc) intelligence, and specific abilities like memory capacity and processing speed.", tag: "Intelligence" },
      { term: "Gardner's multiple intelligences", def: "Gardner's theory: intelligence comes in eight relatively independent forms — linguistic, logical-mathematical, musical, spatial, bodily-kinesthetic, interpersonal, intrapersonal, and naturalistic (+ possibly existential).", tag: "Intelligence" },
      { term: "Savant syndrome", def: "A condition where a person with limited overall mental ability has an exceptional specific skill (e.g., art, music, dates). Evidence Gardner used to argue for multiple intelligences.", tag: "Intelligence" },
      { term: "Sternberg's triarchic theory", def: "Three distinct intelligences: analytical (academic problem-solving), creative (generating novel ideas), and practical (managing everyday tasks).", tag: "Intelligence" },
      { term: "Emotional intelligence", def: "The ability to perceive, understand, manage, and use emotions. Predicts social success and well-being in ways academic intelligence tests do not.", tag: "Intelligence" },
      // ── Assessing Intelligence ──
      { term: "Intelligence test", def: "A method for assessing a person's mental aptitudes and comparing them with others' using numerical scores.", tag: "Assessment" },
      { term: "Achievement test", def: "A test designed to reflect what a person has already learned (e.g., a final exam).", tag: "Assessment" },
      { term: "Aptitude test", def: "A test designed to predict future ability to learn or perform (e.g., the SAT).", tag: "Assessment" },
      { term: "Mental age", def: "Binet's concept: the level of performance typically associated with a certain chronological age. A bright 8-year-old who answers like a typical 10-year-old has a mental age of 10.", tag: "Assessment" },
      { term: "Intelligence quotient (IQ)", def: "Originally mental age ÷ chronological age × 100. Modern tests instead compare scores against the average of same-age peers, set at 100.", tag: "Assessment" },
      { term: "Stanford-Binet", def: "Lewis Terman's revision of Binet's test; today yields a score relative to same-age norms. Still widely used.", tag: "Assessment" },
      { term: "WAIS (Wechsler Adult Intelligence Scale)", def: "The most widely used individual adult intelligence test. Yields an overall score plus subscores for verbal comprehension, perceptual reasoning, working memory, and processing speed.", tag: "Assessment" },
      { term: "Standardization", def: "Defining meaningful scores by pretesting a representative sample and then comparing future test-takers to that group.", tag: "Assessment" },
      { term: "Normal curve (bell curve)", def: "A symmetrical, bell-shaped distribution in which most scores cluster around the mean (100 for IQ), with fewer people at each extreme.", tag: "Assessment" },
      { term: "Reliability", def: "The degree to which a test yields consistent results when retaken. High correlation between repeated administrations = high reliability.", tag: "Assessment" },
      { term: "Validity", def: "The degree to which a test measures or predicts what it is supposed to. Predictive validity: does the score predict future performance?", tag: "Assessment" },
      // ── Nature & Nurture of Intelligence ──
      { term: "Heritability", def: "The portion of variation among individuals in a group attributable to genes. Applies to groups — not individuals. Intelligence heritability estimates: ~50–80%.", tag: "Nature & Nurture" },
      { term: "Growth mindset", def: "Dweck's concept: believing intelligence is changeable and grows through effort. Leads to greater resilience and achievement versus a fixed mindset.", tag: "Nature & Nurture" },
      { term: "Stereotype threat", def: "A self-confirming concern that one will be judged based on a negative stereotype about one's group. Can hijack working memory and impair test performance.", tag: "Nature & Nurture" },
      { term: "Intellectual developmental disorder", def: "A neurodevelopmental condition apparent before age 18, characterized by an IQ score of 70 or below plus significant adaptive behavior limitations.", tag: "Assessment" },
    ]
  },
  {
    id: "ch9",
    num: "Chapter 9",
    title: "Motivation & Emotion",
    cards: [
      // ── Motivational Concepts ──
      { term: "Motivation", def: "A need or desire that energizes and directs behavior; arises from the interplay of nature (bodily 'push') and nurture (learned 'pulls').", tag: "Definition" },
      { term: "Drive-reduction theory", def: "A physiological need creates an aroused, motivated state (a drive) that pushes us to reduce the need — e.g., hunger drives eating. The goal is homeostasis.", tag: "Motivational Concepts" },
      { term: "Homeostasis", def: "The body's natural tendency to maintain a steady internal state, similar to a thermostat regulating room temperature.", tag: "Motivational Concepts" },
      { term: "Incentive", def: "A positive or negative environmental stimulus that lures or repels us, pulling behavior toward or away from it based on learning history.", tag: "Motivational Concepts" },
      { term: "Arousal theory", def: "The idea that we are motivated to seek an optimal level of stimulation and arousal, even when no physiological need exists (e.g., curiosity, exploration).", tag: "Motivational Concepts" },
      { term: "Yerkes-Dodson law", def: "The principle that moderate arousal leads to optimal performance — better than either very low or very high arousal.", tag: "Motivational Concepts" },
      { term: "Maslow's hierarchy of needs", def: "A pyramid of human needs, from basic physiological needs at the base, up through safety, love/belonging, and esteem, to self-actualization and self-transcendence at the top.", tag: "Motivational Concepts" },
      { term: "Self-actualization", def: "In Maslow's hierarchy, the motivation to fulfill one's potential once basic physiological, safety, and social needs are met.", tag: "Motivational Concepts" },
      { term: "Self-transcendence", def: "The level Maslow proposed near the end of his life, above self-actualization, in which people strive for meaning, purpose, and identity beyond the self.", tag: "Motivational Concepts" },
      // ── Hunger ──
      { term: "Set point", def: "The theorized weight 'thermostat' that the body is regulated to maintain, influenced partly by heredity; deviations trigger changes in hunger and energy output.", tag: "Hunger" },
      { term: "Settling point", def: "An alternative to set point — the level at which a person's weight settles in response to caloric intake and energy use, which are influenced by environment as well as biology.", tag: "Hunger" },
      { term: "Basal metabolic rate", def: "The body's resting rate of energy expenditure for maintaining basic functions; it drops when food intake decreases, which helps explain why sustained weight loss is difficult.", tag: "Hunger" },
      { term: "Hypothalamus (hunger)", def: "A brain region that monitors blood chemistry and neural input to control hunger; contains centers that stimulate and centers that suppress appetite.", tag: "Hunger" },
      { term: "Ghrelin", def: "A hunger-arousing hormone secreted by an empty stomach; sends 'I'm hungry' signals to the brain.", tag: "Hunger" },
      { term: "Orexin", def: "A hunger-triggering hormone secreted by the hypothalamus.", tag: "Hunger" },
      { term: "Leptin", def: "A protein hormone secreted by fat cells; when abundant, it causes the brain to increase metabolism and decrease hunger.", tag: "Hunger" },
      { term: "PYY", def: "A digestive-tract hormone that sends 'I'm not hungry' signals to the brain.", tag: "Hunger" },
      // ── The Need to Belong ──
      { term: "Need to belong", def: "A deep, adaptive human motivation to form and maintain relationships; belonging boosted our ancestors' survival and reproduction.", tag: "Belonging" },
      { term: "Self-determination theory", def: "The theory that we strive to satisfy three inborn needs: competence, autonomy, and relatedness; satisfying these boosts motivation and well-being.", tag: "Belonging" },
      { term: "Ostracism", def: "Deliberate social exclusion; a powerful form of social pain that threatens the need to belong and activates brain areas linked to physical pain.", tag: "Belonging" },
      { term: "Phubbing", def: "An Australian-coined term for being 'phone-snubbed' — when a conversation partner seems more interested in their phone than in us; predicts less satisfying relationships.", tag: "Belonging" },
      { term: "Narcissism", def: "Self-esteem gone wild — being self-important, self-focused, and self-promoting; linked to heavier and more self-glamorizing social media use.", tag: "Belonging" },
      // ── Achievement Motivation ──
      { term: "Achievement motivation", def: "Henry Murray's term for a desire for significant accomplishment, mastery of skills or ideas, control, and attainment of a high standard.", tag: "Achievement" },
      { term: "Grit", def: "Angela Duckworth's term for passionate dedication and perseverance toward an ambitious, long-term goal.", tag: "Achievement" },
      { term: "Intrinsic motivation", def: "A desire to perform a behavior for its own sake — for the enjoyment, interest, or satisfaction it provides.", tag: "Achievement" },
      { term: "Extrinsic motivation", def: "A desire to perform a behavior to receive a promised reward or avoid a threatened punishment (e.g., a grade, money, praise).", tag: "Achievement" },
      { term: "SMART goals", def: "Goals that are Specific, Measurable, Achievable, Realistic, and Timely; challenging, well-specified goals motivate persistence and achievement.", tag: "Achievement" },
      // ── Emotion Theories ──
      { term: "Emotion", def: "A response of the whole organism involving physiological arousal, expressive behaviors, and conscious experience, arising from an appraisal of a situation.", tag: "Emotion Theories" },
      { term: "James-Lange theory", def: "The theory that our experience of emotion follows our awareness of our body's physiological response to an emotion-arousing stimulus — we feel afraid because we tremble.", tag: "Emotion Theories" },
      { term: "Cannon-Bard theory", def: "The theory that an emotion-arousing stimulus simultaneously triggers physiological responses and the subjective experience of emotion — the body's arousal and the feeling occur at the same time, independently.", tag: "Emotion Theories" },
      { term: "Schachter-Singer two-factor theory", def: "The theory that emotion requires both physical arousal and a cognitive label — we interpret our arousal based on the surrounding context to identify which emotion we feel.", tag: "Emotion Theories" },
      { term: "Zajonc/LeDoux 'low road'", def: "Robert Zajonc and Joseph LeDoux's proposal that some simple emotional reactions (likes, dislikes, fears) travel a fast neural shortcut from the thalamus directly to the amygdala, bypassing the cortex, before conscious appraisal occurs.", tag: "Emotion Theories" },
      { term: "Lazarus's cognitive appraisal", def: "Richard Lazarus's view that many emotions require a cognitive appraisal — often unconscious and effortless — of whether a stimulus is harmless or dangerous.", tag: "Emotion Theories" },
      // ── Embodied Emotion ──
      { term: "Basic emotions", def: "A small set of emotions — such as anger, fear, disgust, sadness, and happiness — that most emotion scientists agree are fundamental and present across cultures and early in infancy.", tag: "Embodied Emotion" },
      { term: "Valence and arousal (emotion)", def: "The two dimensions along which emotions are commonly categorized: valence (positive vs. negative) and arousal (low vs. high).", tag: "Embodied Emotion" },
      { term: "Emotional arousal (ANS)", def: "In a crisis, the sympathetic division of the autonomic nervous system mobilizes the body for action (faster heart rate, breathing, glucose release); the parasympathetic division calms the body afterward.", tag: "Embodied Emotion" },
      // ── Expressed & Experienced Emotion ──
      { term: "Thin slice", def: "A brief sample of expressive behavior (e.g., a few seconds of video) from which observers can often accurately judge a person's emotions or relationships.", tag: "Expressed Emotion" },
      { term: "Display rules", def: "Culturally learned norms for how much and which emotions are appropriate to express; e.g., Westerners tend toward more enthusiastic, expressive positivity than some East Asian cultures.", tag: "Expressed Emotion" },
      { term: "Facial feedback effect", def: "The tendency for facial muscle states to trigger or intensify the corresponding feeling — e.g., forcing a smile can make you feel a little happier.", tag: "Expressed Emotion" },
      { term: "Behavior feedback effect", def: "The tendency for body posture and movement (not just facial expression) to influence emotional experience — e.g., walking with a bouncy stride can lift mood.", tag: "Expressed Emotion" },
    ]
  },
  {
    id: "ch10",
    num: "Chapter 10",
    title: "Stress, Health, and Human Flourishing",
    cards: [
      // ── Basic Stress Concepts ──
      { term: "Stress", def: "The process of appraising an event as threatening or challenging, and responding to it.", tag: "Basic Concepts" },
      { term: "Stressor", def: "The challenge or event itself (e.g., an exam, a job loss) that triggers the stress process.", tag: "Basic Concepts" },
      { term: "Stress reaction", def: "The physical and emotional response to a stressor — from alarm to exhaustion.", tag: "Basic Concepts" },
      { term: "Primary vs. secondary appraisal", def: "Primary appraisal is deciding whether an event is a stressor; secondary appraisal is assessing one's ability to respond to it.", tag: "Basic Concepts" },
      { term: "Catastrophes", def: "Large-scale, unpredictable disasters (earthquakes, hurricanes, wars, pandemics) that produce significant emotional and physical health damage, even though people often support one another afterward.", tag: "Stressors" },
      { term: "Significant life changes", def: "Major personal transitions — graduating, marrying, a loved one's death, divorce, job loss — that can be stressful even when positive, and that raise disease risk (e.g., in recently widowed, fired, or divorced people).", tag: "Stressors" },
      { term: "Daily hassles", def: "Small, recurring annoyances (lost keys, irritating housemates, overflowing to-do lists) that, especially when chronic, can harm physical and mental well-being and contribute to burnout.", tag: "Stressors" },
      { term: "Approach–approach conflict", def: "A conflict between two attractive, incompatible goals (e.g., tacos or pizza); generally the least stressful type of motivational conflict.", tag: "Stressors" },
      { term: "Avoidance–avoidance conflict", def: "A conflict between two undesirable alternatives, where a person must choose the lesser of two evils.", tag: "Stressors" },
      { term: "Approach–avoidance conflict", def: "A conflict in which a single goal has both appealing and unappealing aspects, producing simultaneous attraction and repulsion.", tag: "Stressors" },
      // ── Stress Reactions ──
      { term: "Fight-or-flight response", def: "Walter Cannon's term for the body's adaptive response to a stressor: the sympathetic nervous system increases heart rate and respiration, diverts blood to skeletal muscles, dulls pain, and releases stored energy to prepare the body for action.", tag: "Stress Reactions" },
      { term: "General adaptation syndrome (GAS)", def: "Hans Selye's concept of the body's adaptive response to stress in three phases: alarm reaction, resistance, and exhaustion.", tag: "Stress Reactions" },
      { term: "Alarm reaction (GAS Phase 1)", def: "The sympathetic nervous system suddenly activates, heart rate soars, and blood rushes to the skeletal muscles.", tag: "Stress Reactions" },
      { term: "Resistance (GAS Phase 2)", def: "Temperature, blood pressure, and respiration remain high as the body mobilizes its resources — including stress hormones — to resist the stressor.", tag: "Stress Reactions" },
      { term: "Exhaustion (GAS Phase 3)", def: "With no relief from constant stress, the body's reserves run out, increasing vulnerability to illness or, in extreme cases, collapse.", tag: "Stress Reactions" },
      { term: "Tend-and-befriend response", def: "A stress response, more common among women, in which people (rather than fighting or fleeing) seek and give social support in times of stress.", tag: "Stress Reactions" },
      // ── Stress Effects and Health ──
      { term: "Psychoneuroimmunology", def: "The study of how psychological, neural, and endocrine processes together affect the immune system and health.", tag: "Stress & Health" },
      { term: "B lymphocytes", def: "White blood cells, formed in the bone marrow, that release antibodies to fight bacterial infections.", tag: "Immune System" },
      { term: "T lymphocytes", def: "White blood cells that form in the thymus and attack cancer cells, viruses, and other foreign substances.", tag: "Immune System" },
      { term: "Macrophage cells", def: "\"Big eater\" immune cells that identify, pursue, and ingest harmful invaders and worn-out cells.", tag: "Immune System" },
      { term: "Natural killer (NK) cells", def: "Immune cells that attack diseased body cells, such as those infected by viruses or cancer.", tag: "Immune System" },
      { term: "Immune system overreaction", def: "A dysfunction in which the immune system attacks the body's own tissues, contributing to conditions like arthritis, allergic reactions, or autoimmune disease.", tag: "Immune System" },
      { term: "Immune system underreaction", def: "A dysfunction in which the immune system fails to adequately respond, allowing infections to flare, dormant viruses to erupt, or cancer cells to multiply.", tag: "Immune System" },
      { term: "Coronary heart disease", def: "The United States' leading cause of death, caused by the closing of the blood vessels that nourish the heart muscle; risk is raised by high blood pressure, family history, smoking, obesity, poor diet, inactivity, and high cholesterol — and by stress and personality factors.", tag: "Stress & Health" },
      { term: "Type A personality", def: "Meyer Friedman and Ray Rosenman's term for competitive, hard-driving, impatient, verbally aggressive, and anger-prone people — whose toxic core (especially anger) is linked to higher heart attack risk.", tag: "Stress & Health" },
      { term: "Type B personality", def: "Friedman and Rosenman's term for easygoing, relaxed people, who show markedly lower rates of heart attack than Type A individuals.", tag: "Stress & Health" },
      { term: "Pessimism and heart disease", def: "A tendency to expect the worst that is associated with more than double the risk of developing heart disease compared with optimists.", tag: "Stress & Health" },
      // ── Coping With Stress ──
      { term: "Problem-focused coping", def: "Attempting to reduce stress directly, by changing the stressor or the way one interacts with it; used when a person feels a sense of control over the situation.", tag: "Coping" },
      { term: "Emotion-focused coping", def: "Attempting to reduce stress by avoiding or ignoring a stressor and attending to emotional needs related to one's stress reaction; used when a person feels unable to change the situation.", tag: "Coping" },
      { term: "Personal control", def: "A sense of controlling one's environment rather than feeling helpless; higher perceived control is linked with better health, achievement, and lower stress hormone levels.", tag: "Coping" },
      { term: "Learned helplessness", def: "The hopelessness and passive resignation an animal or person learns after repeated exposure to uncontrollable aversive events.", tag: "Coping" },
      { term: "Tyranny of choice", def: "The finding that an excess of freedom and options can produce information overload, decreased satisfaction, increased depression, or behavioral paralysis.", tag: "Coping" },
      { term: "External locus of control", def: "The perception that chance or outside forces beyond one's personal control determine one's fate.", tag: "Coping" },
      { term: "Internal locus of control", def: "The perception that one controls one's own fate; associated with better achievement, health, and lower depression.", tag: "Coping" },
      { term: "Self-control", def: "The ability to control impulses and delay short-term gratification for greater long-term rewards; strengthens with practice but can also temporarily tire, like a muscle.", tag: "Coping" },
      { term: "Optimism", def: "A general expectation that good things will happen; optimists tend to expect control, cope well with stress, and enjoy better health and longevity than pessimists.", tag: "Coping" },
      { term: "Pessimism", def: "A general expectation that bad things will happen; linked to poorer coping and worse health outcomes, including increased heart attack risk.", tag: "Coping" },
      { term: "Emotion regulation", def: "The ways people influence which emotions they have, when they have them, and how they experience or express them; effective regulation is linked to greater happiness, life satisfaction, and social closeness.", tag: "Coping" },
      { term: "Situation selection (emotion regulation)", def: "James Gross's strategy of changing one's situation in order to influence one's feelings (e.g., getting new roommates).", tag: "Coping" },
      { term: "Cognitive reappraisal", def: "James Gross's strategy of thinking about a situation in a more neutral way to reduce its negative emotional impact; generally more effective and healthier than suppression.", tag: "Coping" },
      { term: "Emotional suppression", def: "James Gross's strategy of containing or hiding one's feelings; tends to backfire, producing poorer stress coping and less authentic social relationships.", tag: "Coping" },
      { term: "Social support (stress)", def: "Feeling liked, encouraged, and helped when needed by friends and family; promotes happiness and health by calming the cardiovascular system and strengthening immune functioning.", tag: "Coping" },
      { term: "Finding meaning", def: "Discovering some redeeming purpose in one's suffering, which helps people cope with catastrophes and significant life changes.", tag: "Coping" },
      // ── Managing Stress Effects ──
      { term: "Aerobic exercise", def: "Sustained activity that increases heart and lung fitness; reduces depression and anxiety, boosts mood and energy, and is linked to both longer and higher-quality life.", tag: "Managing Stress" },
      { term: "Relaxation training", def: "Techniques that reduce arousal and can relieve headaches, high blood pressure, anxiety, and insomnia, and even help wounds heal faster.", tag: "Managing Stress" },
      { term: "Meditation", def: "A practice, found across world religions, that reduces suffering and improves awareness, insight, and compassion; used broadly in stress management today.", tag: "Managing Stress" },
      { term: "Mindfulness meditation", def: "A reflective practice in which a person attends nonjudgmentally to their current inner state and experiences; boosts happiness and eases anxiety and depression, and is linked with improved sleep and immune functioning.", tag: "Managing Stress" },
      { term: "Faith factor", def: "The consistent finding that religiously active people tend to live longer than those who are not, explained in part by healthier behaviors, stronger social support, and more positive emotions.", tag: "Managing Stress" },
      // ── Happiness and Well-Being ──
      { term: "Subjective well-being", def: "Self-perceived satisfaction with life, often used along with measures of positive/negative affect to define happiness.", tag: "Happiness" },
      { term: "Feel-good, do-good phenomenon", def: "The tendency for people to be more willing to help others when they are already in a good mood.", tag: "Happiness" },

let selected = new Set();

/* ═══════════════════════════════════════════
   HOME SCREEN
════════════════════════════════════════════ */
function buildHome() {
  const grid = document.getElementById("chapterGrid");
  grid.innerHTML = "";
  CHAPTERS.forEach(ch => {
    const div = document.createElement("div");
    div.className = "chapter-card" + (ch.coming ? " coming-soon" : "") + (selected.has(ch.id) ? " selected" : "");
    div.innerHTML = `
      <div class="ch-num">${ch.num}</div>
      <div class="ch-title">${ch.title}</div>
      <div class="ch-count">${ch.coming ? "Coming soon" : ch.cards.length + " cards"}</div>
    `;
    if (!ch.coming) div.onclick = () => toggleChapter(ch.id, div);
    grid.appendChild(div);
  });
  updateStartBtn();
}

function toggleChapter(id, el) {
  if (selected.has(id)) { selected.delete(id); el.classList.remove("selected"); }
  else { selected.add(id); el.classList.add("selected"); }
  updateStartBtn();
}

function selectAll() {
  CHAPTERS.filter(c => !c.coming).forEach(c => selected.add(c.id));
  buildHome();
}

function clearAll() {
  selected.clear();
  buildHome();
}

function updateStartBtn() {
  const btn = document.getElementById("startBtn");
  const total = [...selected].reduce((n, id) => {
    const ch = CHAPTERS.find(c => c.id === id);
    return n + (ch ? ch.cards.length : 0);
  }, 0);
  btn.disabled = total === 0;
  btn.textContent = total === 0
    ? "Select at least one chapter"
    : "Start flashcards (" + total + " cards)";
}

function startStudy() {
  const chs = CHAPTERS.filter(c => selected.has(c.id));
  deck = chs.flatMap(ch => ch.cards.map(card => ({ ...card, chapter: ch.num })));
  shuffle(deck);

  const isMulti = chs.length > 1;
  document.getElementById("studyTitle").textContent = isMulti
    ? chs.map(c => c.num).join(" + ")
    : chs[0].num + " — " + chs[0].title;
  document.getElementById("studySubtitle").textContent = deck.length + " cards";

  known.clear(); again.clear();
  idx = 0; flipped = false; activeTag = "All";

  buildTagFilter(isMulti);
  applyFilter();

  document.getElementById("homeScreen").style.display = "none";
  document.getElementById("studyScreen").style.display = "block";
  document.getElementById("complete").style.display = "none";
  document.getElementById("cardScene").style.display = "block";
  document.getElementById("actions").style.display = "none";
}

function goHome() {
  document.getElementById("homeScreen").style.display = "block";
  document.getElementById("studyScreen").style.display = "none";
  buildHome();
}

/* ═══════════════════════════════════════════
   STUDY SCREEN — TAG FILTER
════════════════════════════════════════════ */
function buildTagFilter(showChapterFilter) {
  const row = document.getElementById("filterRow");
  row.innerHTML = "";
  const tags = ["All", ...Array.from(new Set(deck.map(c => c.tag)))];
  if (showChapterFilter) {
    const chTags = [...selected].map(id => CHAPTERS.find(c => c.id === id).num);
    tags.push(...chTags);
  }
  tags.forEach(t => {
    const btn = document.createElement("button");
    btn.className = "chip" + (t === "All" ? " active" : "");
    btn.textContent = t;
    btn.onclick = () => {
      activeTag = t;
      document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      btn.classList.add("active");
      applyFilter();
    };
    row.appendChild(btn);
  });
}

function applyFilter() {
  if (activeTag === "All") {
    filteredDeck = [...deck];
  } else if (activeTag.startsWith("Chapter")) {
    filteredDeck = deck.filter(c => c.chapter === activeTag);
  } else {
    filteredDeck = deck.filter(c => c.tag === activeTag);
  }
  known.clear(); again.clear();
  idx = 0; flipped = false;
  document.getElementById("complete").style.display = "none";
  document.getElementById("cardScene").style.display = "block";
  document.getElementById("actions").style.display = "none";
  render();
}

/* ═══════════════════════════════════════════
   STUDY SCREEN — CARD LOGIC
════════════════════════════════════════════ */
function render() {
  if (filteredDeck.length === 0) { showComplete(); return; }
  if (idx >= filteredDeck.length) { showComplete(); return; }
  const card = filteredDeck[idx];
  document.getElementById("navCounter").textContent = (idx + 1) + " / " + filteredDeck.length;
  document.getElementById("cardTerm").textContent = card.term;
  document.getElementById("cardDef").textContent = card.def;
  document.getElementById("cardBadge").textContent = card.tag;
  document.getElementById("cardChapter").textContent = card.chapter;
  document.getElementById("cardScene").classList.remove("flipped");
  document.getElementById("actions").style.display = "none";
  flipped = false;
  updateStats();
}

function flipCard() {
  if (!flipped) {
    document.getElementById("cardScene").classList.add("flipped");
    document.getElementById("actions").style.display = "flex";
    flipped = true;
  } else {
    document.getElementById("cardScene").classList.remove("flipped");
    flipped = false;
  }
}

function markCard(isKnown) {
  const card = filteredDeck[idx];
  if (isKnown) { known.add(card.term); again.delete(card.term); }
  else { again.add(card.term); known.delete(card.term); }
  idx++;
  if (idx >= filteredDeck.length) showComplete(); else render();
}

function nextCard() { if (idx < filteredDeck.length - 1) { idx++; render(); } }
function prevCard() { if (idx > 0) { idx--; render(); } }

function updateStats() {
  document.getElementById("statTotal").textContent = filteredDeck.length;
  document.getElementById("statKnow").textContent = known.size;
  document.getElementById("statAgain").textContent = again.size;
  const pct = filteredDeck.length ? Math.round((known.size / filteredDeck.length) * 100) : 0;
  document.getElementById("progressBar").style.width = pct + "%";
}

function showComplete() {
  document.getElementById("cardScene").style.display = "none";
  document.getElementById("actions").style.display = "none";
  document.getElementById("complete").style.display = "block";
  const stillCount = again.size;
  document.getElementById("completeDetail").textContent =
    "You marked " + known.size + " of " + filteredDeck.length + " cards as 'know it'."
    + (stillCount > 0 ? " " + stillCount + " card" + (stillCount !== 1 ? "s" : "") + " still need work." : " Great job!");
  document.getElementById("studyAgainBtn").style.display = stillCount > 0 ? "inline-block" : "none";
  updateStats();
}

function restartDeck() {
  known.clear(); again.clear(); idx = 0; flipped = false;
  shuffle(filteredDeck);
  document.getElementById("complete").style.display = "none";
  document.getElementById("cardScene").style.display = "block";
  document.getElementById("actions").style.display = "none";
  render();
}

function restartStillLearning() {
  const stillTerms = new Set(again);
  filteredDeck = filteredDeck.filter(c => stillTerms.has(c.term));
  known.clear(); again.clear(); idx = 0; flipped = false;
  shuffle(filteredDeck);
  document.getElementById("complete").style.display = "none";
  document.getElementById("cardScene").style.display = "block";
  document.getElementById("actions").style.display = "none";
  render();
}

function shuffle(arr) {
  const rnd = new Uint32Array(arr.length);
  crypto.getRandomValues(rnd);
  for (let i = arr.length - 1; i > 0; i--) {
    const j = rnd[i] % (i + 1);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

    const saved = rows[0];
    const ch = CHAPTERS.find(c => c.id === chId);
    if (ch) ch.cards.push({ term, def, tag, custom: true, dbId: saved.id });
    closeCreateModal();
    buildHome();
  } catch(e) {
    errEl.textContent = "Error saving: " + e.message;
    errEl.style.display = "block";
  } finally {
    saveBtn.textContent = "Add card";
    saveBtn.disabled = false;
  }
}

document.getElementById("createModal").addEventListener("click", function(e) {
  if (e.target === this) closeCreateModal();
});

/* ═══════════════════════════════════════════
   CUSTOM CARDS LIST (home screen)
════════════════════════════════════════════ */
function buildCustomList() {
  const container = document.getElementById("customCardsList");
  const allCustom = CHAPTERS.flatMap(ch =>
    ch.cards.filter(c => c.custom).map(c => ({ ...c, chId: ch.id, chNum: ch.num }))
  );
  if (!allCustom.length) {
    container.innerHTML = "";
    document.getElementById("customCardsSection").style.display = "none";
    return;
  }
  document.getElementById("customCardsSection").style.display = "block";
  container.innerHTML = allCustom.map(c => `
    <div style="display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:0.5px solid var(--border);">
      <div style="flex:1; min-width:0;">
        <div style="font-size:13px; font-weight:500; color:var(--text);">${escHtml(c.term)}</div>
        <div style="font-size:12px; color:var(--text2); margin-top:2px; line-height:1.4;">${escHtml(c.def)}</div>
        <div style="font-size:11px; color:var(--text3); margin-top:3px;">${escHtml(c.chNum)} &middot; ${escHtml(c.tag)}</div>
      </div>
      <button onclick="deleteCustomCard('${escHtml(String(c.dbId))}', '${escHtml(c.chId)}', '${escHtml(c.term)}')"
        style="flex-shrink:0; background:none; border:none; cursor:pointer; color:var(--text3); font-size:16px; padding:2px 4px; line-height:1;"
        title="Delete card">&times;</button>
    </div>
  `).join("");
}

function escHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

const _origBuildHome = buildHome;
buildHome = function() { _origBuildHome(); buildCustomList(); };

/* init */
// Render immediately with the built-in cards (no network wait needed for these).
buildHome();
// Then fetch any custom cards from Supabase in the background and quietly
// re-render once they arrive, instead of blocking the whole page on it.
loadCustomCards().then(() => buildHome());
</script>
</body>
